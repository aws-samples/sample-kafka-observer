<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" role="img" aria-label="Production topology: RF4 — 3 ISR brokers across 3 AZs plus 1 observer in a remote AZ/DC">
  <title>Kafka Observer Replicas — production topology (RF4: 3 ISR + 1 observer)</title>
  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#30d158"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#bf5af2"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#2997ff"/></marker>
  </defs>
  <rect width="1000" height="560" fill="#1a2332"/>

  <!-- Title -->
  <text x="500" y="32" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Production topology — RF4: 3 ISR members (3 AZs) + 1 observer (remote)</text>
  <text x="500" y="52" fill="#8b95a7" font-size="12" text-anchor="middle">acks=all waits only for the ISR · observer byte-copies the log · lose 1 AZ → writes continue · lose 2 AZs → promote observer</text>

  <!-- Producer -->
  <rect x="430" y="70" width="140" height="42" rx="8" fill="#0f1622" stroke="#2997ff" stroke-width="2"/>
  <text x="500" y="96" fill="#2997ff" font-size="14" font-weight="600" text-anchor="middle">Producer</text>

  <!-- ISR box around three AZs -->
  <rect x="40" y="140" width="700" height="290" rx="14" fill="rgba(48,209,88,0.05)" stroke="#30d158" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="60" y="164" fill="#30d158" font-size="13" font-weight="700">ISR — acks=all quorum · HW = min(LEO of ISR) · leader candidates come from here</text>

  <!-- AZ-a: broker1 leader -->
  <rect x="70" y="190" width="190" height="200" rx="10" fill="#0f1622" stroke="#3a4556" stroke-width="1.5"/>
  <text x="165" y="214" fill="#8b95a7" font-size="12" font-weight="600" text-anchor="middle">AZ-a</text>
  <rect x="95" y="230" width="140" height="70" rx="8" fill="#1a2332" stroke="#ff9900" stroke-width="3"/>
  <text x="165" y="258" fill="#ff9900" font-size="14" font-weight="700" text-anchor="middle">broker 1</text>
  <text x="165" y="280" fill="#ff9900" font-size="11" text-anchor="middle">LEADER</text>
  <rect x="115" y="320" width="100" height="40" rx="6" fill="#0f1622" stroke="#5a6b7b" stroke-width="1"/>
  <text x="165" y="345" fill="#8b95a7" font-size="10" text-anchor="middle">controller 1</text>

  <!-- AZ-b: broker2 -->
  <rect x="295" y="190" width="190" height="200" rx="10" fill="#0f1622" stroke="#3a4556" stroke-width="1.5"/>
  <text x="390" y="214" fill="#8b95a7" font-size="12" font-weight="600" text-anchor="middle">AZ-b</text>
  <rect x="320" y="230" width="140" height="70" rx="8" fill="#1a2332" stroke="#30d158" stroke-width="2.5"/>
  <text x="390" y="258" fill="#30d158" font-size="14" font-weight="700" text-anchor="middle">broker 2</text>
  <text x="390" y="280" fill="#30d158" font-size="11" text-anchor="middle">ISR follower</text>
  <rect x="340" y="320" width="100" height="40" rx="6" fill="#0f1622" stroke="#5a6b7b" stroke-width="1"/>
  <text x="390" y="345" fill="#8b95a7" font-size="10" text-anchor="middle">controller 2</text>

  <!-- AZ-c: broker3 -->
  <rect x="520" y="190" width="190" height="200" rx="10" fill="#0f1622" stroke="#3a4556" stroke-width="1.5"/>
  <text x="615" y="214" fill="#8b95a7" font-size="12" font-weight="600" text-anchor="middle">AZ-c</text>
  <rect x="545" y="230" width="140" height="70" rx="8" fill="#1a2332" stroke="#30d158" stroke-width="2.5"/>
  <text x="615" y="258" fill="#30d158" font-size="14" font-weight="700" text-anchor="middle">broker 3</text>
  <text x="615" y="280" fill="#30d158" font-size="11" text-anchor="middle">ISR follower</text>
  <rect x="565" y="320" width="100" height="40" rx="6" fill="#0f1622" stroke="#5a6b7b" stroke-width="1"/>
  <text x="615" y="345" fill="#8b95a7" font-size="10" text-anchor="middle">controller 3</text>

  <!-- Remote AZ/DC: broker4 observer (OUTSIDE ISR box) -->
  <rect x="775" y="190" width="200" height="200" rx="10" fill="rgba(191,90,242,0.06)" stroke="#bf5af2" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="875" y="214" fill="#bf5af2" font-size="12" font-weight="600" text-anchor="middle">Remote AZ / DC</text>
  <rect x="800" y="230" width="150" height="70" rx="8" fill="#1a2332" stroke="#bf5af2" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="875" y="258" fill="#bf5af2" font-size="14" font-weight="700" text-anchor="middle">broker 4</text>
  <text x="875" y="280" fill="#bf5af2" font-size="11" text-anchor="middle">OBSERVER</text>
  <text x="875" y="330" fill="#bf5af2" font-size="10" text-anchor="middle">syncs all data</text>
  <text x="875" y="346" fill="#bf5af2" font-size="10" text-anchor="middle">never in ISR · never elected</text>
  <text x="875" y="362" fill="#8b95a7" font-size="10" text-anchor="middle">promote = edit observer.ids</text>

  <!-- Data flows -->
  <!-- producer -> leader -->
  <line x1="500" y1="112" x2="200" y2="228" stroke="#2997ff" stroke-width="2" marker-end="url(#arrB)" opacity="0.7"/>
  <circle r="4" fill="#2997ff"><animateMotion dur="1.4s" repeatCount="indefinite" path="M500,112 L210,225"/></circle>

  <!-- leader -> follower2 (solid green, replication) -->
  <line x1="235" y1="265" x2="318" y2="265" stroke="#30d158" stroke-width="2" marker-end="url(#arrG)"/>
  <circle r="4" fill="#30d158"><animateMotion dur="1.2s" repeatCount="indefinite" path="M235,265 L316,265"/></circle>

  <!-- leader -> follower3 -->
  <path d="M235,285 Q390,310 543,285" fill="none" stroke="#30d158" stroke-width="2" marker-end="url(#arrG)"/>
  <circle r="4" fill="#30d158"><animateMotion dur="1.5s" repeatCount="indefinite" path="M235,285 Q390,310 543,285"/></circle>

  <!-- leader -> observer (dashed purple) -->
  <path d="M235,295 Q500,400 798,290" fill="none" stroke="#bf5af2" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrP)"/>
  <circle r="4" fill="#bf5af2"><animateMotion dur="1.9s" repeatCount="indefinite" path="M235,295 Q500,400 798,290"/></circle>

  <!-- HW annotation -->
  <rect x="60" y="450" width="520" height="44" rx="8" fill="#0f1622" stroke="#30d158" stroke-width="1.5"/>
  <text x="80" y="470" fill="#30d158" font-size="12" font-weight="600">HW = min(LEO of ISR members) — observer excluded structurally</text>
  <text x="80" y="486" fill="#8b95a7" font-size="11">acks=all latency stays at ISR pace: measured 2.04–2.35 ms with observer in the slowest location</text>

  <!-- Failure behavior legend -->
  <rect x="600" y="450" width="380" height="90" rx="8" fill="#0f1622" stroke="#3a4556" stroke-width="1"/>
  <text x="620" y="470" fill="#fff" font-size="12" font-weight="700">Failure behavior (minISR=2)</text>
  <text x="620" y="490" fill="#30d158" font-size="11">Lose 1 AZ → ISR 3→2 ≥ minISR → writes continue, NO promotion</text>
  <text x="620" y="508" fill="#ff9900" font-size="11">Lose 2 AZs → ISR 1 &lt; minISR → fail-stop → promote observer (~9 s)</text>
  <text x="620" y="526" fill="#bf5af2" font-size="11">Observer down → zero impact on writes (it was never in the quorum)</text>

  <!-- Legend -->
  <g font-size="10" fill="#8b95a7">
    <rect x="60" y="510" width="14" height="10" fill="none" stroke="#ff9900" stroke-width="2"/><text x="80" y="519">leader</text>
    <rect x="135" y="510" width="14" height="10" fill="none" stroke="#30d158" stroke-width="2"/><text x="155" y="519">ISR follower</text>
    <rect x="235" y="510" width="14" height="10" fill="none" stroke="#bf5af2" stroke-width="2" stroke-dasharray="4 3"/><text x="255" y="519">observer</text>
    <line x1="330" y1="515" x2="360" y2="515" stroke="#30d158" stroke-width="2"/><text x="368" y="519">sync (counted for acks)</text>
    <line x1="500" y1="515" x2="530" y2="515" stroke="#bf5af2" stroke-width="2" stroke-dasharray="5 3"/><text x="538" y="519">sync (not counted)</text>
  </g>
</svg>
