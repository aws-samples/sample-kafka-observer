<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Story animation: observer demotion, 16 s loop, 5 phases (0-3-6-9-13-16 s) -->
  <rect x="0" y="0" width="1000" height="600" rx="12" fill="#1a2332"/>
  <text x="30" y="34" fill="#e6edf3" font-size="19" font-weight="700">Story · Demotion — ISR member steps back to observer</text>
  <text x="970" y="34" fill="#9fb0c3" font-size="12" text-anchor="end">16 s loop · native shrink path, replication never stops</text>

  <!-- ===== Phase banners ===== -->
  <g font-size="21" font-weight="800" text-anchor="middle">
    <text x="500" y="80" fill="#9fb0c3" opacity="0">STEP 0 · Steady state — broker 3 is a full ISR member (e.g. after a drill)
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.17;0.1875;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#d29922" opacity="0">STEP 1 · Operator adds broker 3's id back into observer.ids
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1875;0.21;0.355;0.375;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#58a6ff" opacity="0">STEP 2 · isr-expiration tick → getOutOfSyncReplicas() reports broker 3
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.375;0.395;0.54;0.5625;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#bf5af2" opacity="0">STEP 3 · Native ISR shrink pushes broker 3 out (measured ~9–12 s)
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5625;0.585;0.79;0.8125;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#30d158" opacity="0">STEP 4 · Back to observer ✓  Still syncing ✓  Zero restart, zero loss ✓
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.8125;0.835;0.99;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== ISR boundary (shrinks in STEP 3) ===== -->
  <rect x="85" y="120" width="830" height="185" rx="10" fill="none" stroke="#30d158" stroke-width="2">
    <animate attributeName="width" values="830;830;520;520" keyTimes="0;0.5625;0.66;1" dur="16s" repeatCount="indefinite"/>
  </rect>
  <text x="100" y="142" fill="#30d158" font-size="13" font-weight="700">ISR = {1, 2, 3}
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5625;0.62;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="100" y="142" fill="#30d158" font-size="13" font-weight="700" opacity="0">ISR = {1, 2}
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.62;0.66;1" dur="16s" repeatCount="indefinite"/></text>

  <!-- ===== Brokers ===== -->
  <g>
    <rect x="110" y="160" width="170" height="110" rx="10" fill="#223044" stroke="#ff9900" stroke-width="3"/>
    <text x="195" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 1</text>
    <text x="195" y="214" fill="#ff9900" font-size="13" font-weight="700" text-anchor="middle">LEADER</text>
    <text x="195" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-a · runs isr-expiration</text>
  </g>
  <g>
    <rect x="395" y="160" width="170" height="110" rx="10" fill="#223044" stroke="#30d158" stroke-width="2"/>
    <text x="480" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 2</text>
    <text x="480" y="214" fill="#30d158" font-size="13" font-weight="700" text-anchor="middle">follower · in ISR</text>
    <text x="480" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-b</text>
  </g>
  <!-- broker 3: starts as solid green ISR member -->
  <g>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5625;0.68;1" dur="16s" repeatCount="indefinite"/>
    <rect x="700" y="160" width="170" height="110" rx="10" fill="#16281f" stroke="#30d158" stroke-width="2.5"/>
    <text x="785" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 3</text>
    <text x="785" y="214" fill="#30d158" font-size="13" font-weight="700" text-anchor="middle">ISR MEMBER</text>
    <text x="785" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-c · electable</text>
  </g>
  <!-- broker 3: becomes dashed purple observer -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5625;0.68;1" dur="16s" repeatCount="indefinite"/>
    <rect x="700" y="160" width="170" height="110" rx="10" fill="#241f33" stroke="#bf5af2" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="785" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 3</text>
    <text x="785" y="214" fill="#bf5af2" font-size="13" font-weight="700" text-anchor="middle">OBSERVER</text>
    <text x="785" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-c · syncs, not electable</text>
  </g>

  <!-- ===== Replication flows ===== -->
  <line x1="280" y1="215" x2="395" y2="215" stroke="#3d4f66" stroke-width="1.5"/>
  <circle r="4.5" fill="#4dabf7">
    <animateMotion path="M280,215 L395,215" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- leader -> broker3: solid green while in ISR -->
  <g>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5625;0.68;1" dur="16s" repeatCount="indefinite"/>
    <path d="M285,272 C 430,325 555,325 700,262" fill="none" stroke="#30d158" stroke-width="1.5"/>
    <circle r="4.5" fill="#30d158">
      <animateMotion path="M285,272 C 430,325 555,325 700,262" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- same path turns dashed purple after demotion: replication continues! -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5625;0.68;1" dur="16s" repeatCount="indefinite"/>
    <path d="M285,272 C 430,325 555,325 700,262" fill="none" stroke="#bf5af2" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.7"/>
    <circle r="3.5" fill="#bf5af2">
      <animateMotion path="M285,272 C 430,325 555,325 700,262" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#bf5af2">
      <animateMotion path="M285,272 C 430,325 555,325 700,262" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== Standing red warning (always visible) ===== -->
  <rect x="640" y="330" width="330" height="40" rx="8" fill="#2a1518" stroke="#ff453a" stroke-width="1.5"/>
  <text x="805" y="348" fill="#ff453a" font-size="11.5" font-weight="800" text-anchor="middle">⚠ If broker 3 is the LEADER: move leadership first!</text>
  <text x="805" y="363" fill="#ffb3ad" font-size="10" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">kafka-leader-election.sh --election-type preferred</text>

  <!-- ===== Bottom detail panels ===== -->
  <!-- STEP 1: terminal + file icon -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1875;0.21;0.355;0.375;1" dur="16s" repeatCount="indefinite"/>
    <rect x="140" y="390" width="470" height="92" rx="8" fill="#0d1420" stroke="#d29922" stroke-width="1.5"/>
    <circle cx="160" cy="408" r="4.5" fill="#ff453a"/><circle cx="176" cy="408" r="4.5" fill="#d29922"/><circle cx="192" cy="408" r="4.5" fill="#30d158"/>
    <text x="160" y="438" fill="#e6edf3" font-size="13" font-family="ui-monospace,Menlo,monospace">$ echo "3" &gt; observer.ids    # add broker 3 back</text>
    <text x="160" y="462" fill="#9fb0c3" font-size="11" font-family="ui-monospace,Menlo,monospace"># on ALL nodes, same atomic pattern (write tmp → mv)</text>
    <path d="M650,398 h48 l16,16 v56 h-64 z" fill="#241f33" stroke="#bf5af2" stroke-width="2">
      <animate attributeName="stroke-width" values="2;3.5;2;3.5;2" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M698,398 v16 h16" fill="none" stroke="#bf5af2" stroke-width="2"/>
    <text x="682" y="490" fill="#bf5af2" font-size="11.5" font-weight="700" text-anchor="middle">observer.ids</text>
    <text x="682" y="442" fill="#9fb0c3" font-size="10" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">∅ → 3</text>
  </g>

  <!-- STEP 2: clock + hook -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.375;0.395;0.54;0.5625;1" dur="16s" repeatCount="indefinite"/>
    <rect x="120" y="388" width="760" height="96" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <!-- clock icon: isr-expiration periodic task -->
    <g transform="translate(190,436)">
      <circle r="20" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
      <line x1="0" y1="0" x2="0" y2="-13" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="8" y2="0" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="240" y="424" fill="#e6edf3" font-size="13" font-weight="700">isr-expiration task fires</text>
    <text x="240" y="444" fill="#9fb0c3" font-size="11">every replica.lag.time.max.ms / 2 (5 s here)</text>
    <path d="M475,436 L545,436" stroke="#58a6ff" stroke-width="2.5">
      <animate attributeName="opacity" values="1;0.25;1" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M545,436 l-10,-6 v12 z" fill="#58a6ff"/>
    <rect x="560" y="406" width="300" height="60" rx="8" fill="#0d1420" stroke="#bf5af2"/>
    <text x="710" y="431" fill="#e6edf3" font-size="12.5" font-weight="700" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">getOutOfSyncReplicas() hook</text>
    <text x="710" y="452" fill="#bf5af2" font-size="11" font-weight="700" text-anchor="middle">reports broker 3 as "out of sync" → native shrink</text>
  </g>

  <!-- STEP 3: native shrink note -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5625;0.585;0.79;0.8125;1" dur="16s" repeatCount="indefinite"/>
    <rect x="180" y="398" width="640" height="76" rx="8" fill="#20293a" stroke="#bf5af2"/>
    <text x="500" y="430" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">AlterPartition → controller removes broker 3 from ISR</text>
    <text x="500" y="454" fill="#9fb0c3" font-size="12" text-anchor="middle">stock shrink path — broker 3 keeps fetching data the whole time</text>
  </g>

  <!-- STEP 4: results -->
  <g opacity="0" text-anchor="middle">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.8125;0.835;0.99;1" dur="16s" repeatCount="indefinite"/>
    <text x="500" y="428" fill="#30d158" font-size="22" font-weight="800">Back to observer ✓   Replication uninterrupted ✓   Zero restart ✓</text>
    <text x="500" y="458" fill="#9fb0c3" font-size="12.5">measured ~9–12 s (KRaft) — a pure metadata change, data keeps flowing as a dashed purple stream</text>
  </g>

  <!-- ===== Loop progress bar ===== -->
  <line x1="80" y1="545" x2="920" y2="545" stroke="#3d4f66" stroke-width="2"/>
  <g stroke="#3d4f66"><line x1="80" y1="540" x2="80" y2="550"/><line x1="237.5" y1="540" x2="237.5" y2="550"/><line x1="395" y1="540" x2="395" y2="550"/><line x1="552.5" y1="540" x2="552.5" y2="550"/><line x1="762.5" y1="540" x2="762.5" y2="550"/><line x1="920" y1="540" x2="920" y2="550"/></g>
  <g fill="#9fb0c3" font-size="10" text-anchor="middle">
    <text x="80" y="568">0 s</text><text x="237.5" y="568">3 s · edit file</text><text x="395" y="568">6 s · expiration tick</text><text x="552.5" y="568">9 s · ISR shrinks</text><text x="762.5" y="568">13 s · done</text><text x="920" y="568">16 s ↺</text>
  </g>
  <circle cy="545" r="5" fill="#e6edf3">
    <animate attributeName="cx" values="80;920" dur="16s" repeatCount="indefinite"/>
  </circle>
</svg>
