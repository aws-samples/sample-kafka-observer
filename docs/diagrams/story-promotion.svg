<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Story animation: observer promotion, 16 s loop, 5 phases (0-3-6-9-13-16 s) -->
  <rect x="0" y="0" width="1000" height="600" rx="12" fill="#1a2332"/>
  <text x="30" y="34" fill="#e6edf3" font-size="19" font-weight="700">Story · Promotion — observer becomes an electable ISR member</text>
  <text x="970" y="34" fill="#9fb0c3" font-size="12" text-anchor="end">16 s loop · every step after the file edit is native Kafka</text>

  <!-- ===== Phase banners (one visible at a time) ===== -->
  <g font-size="21" font-weight="800" text-anchor="middle">
    <text x="500" y="80" fill="#9fb0c3" opacity="0">STEP 0 · Steady state — observer syncs data but stays outside ISR
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.17;0.1875;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#d29922" opacity="0">STEP 1 · Operator removes broker 3's id from observer.ids
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1875;0.21;0.355;0.375;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#58a6ff" opacity="0">STEP 2 · Cache refresh → next fetch → canAddReplicaToIsr() gate OPENS
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.375;0.395;0.54;0.5625;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#30d158" opacity="0">STEP 3 · Native ISR expansion pulls broker 3 in (measured ~4–10 s)
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5625;0.585;0.79;0.8125;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#30d158" opacity="0">STEP 4 · Can be elected ✓  Zero restart ✓  Zero data movement ✓
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.8125;0.835;0.99;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== ISR boundary (expands in STEP 3) ===== -->
  <rect x="85" y="120" width="520" height="185" rx="10" fill="none" stroke="#30d158" stroke-width="2">
    <animate attributeName="width" values="520;520;830;830" keyTimes="0;0.5625;0.66;1" dur="16s" repeatCount="indefinite"/>
  </rect>
  <text x="100" y="142" fill="#30d158" font-size="13" font-weight="700">ISR = {1, 2}
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5625;0.62;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="100" y="142" fill="#30d158" font-size="13" font-weight="700" opacity="0">ISR = {1, 2, 3}
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.62;0.66;1" dur="16s" repeatCount="indefinite"/></text>

  <!-- ===== Brokers ===== -->
  <!-- broker 1: leader -->
  <g>
    <rect x="110" y="160" width="170" height="110" rx="10" fill="#223044" stroke="#ff9900" stroke-width="3"/>
    <text x="195" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 1</text>
    <text x="195" y="214" fill="#ff9900" font-size="13" font-weight="700" text-anchor="middle">LEADER</text>
    <text x="195" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-a · acks from ISR</text>
  </g>
  <!-- broker 2: ISR follower -->
  <g>
    <rect x="395" y="160" width="170" height="110" rx="10" fill="#223044" stroke="#30d158" stroke-width="2"/>
    <text x="480" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 2</text>
    <text x="480" y="214" fill="#30d158" font-size="13" font-weight="700" text-anchor="middle">follower · in ISR</text>
    <text x="480" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-b</text>
  </g>
  <!-- broker 3: observer (dashed purple), overlaid by solid green after promotion -->
  <g>
    <rect x="700" y="160" width="170" height="110" rx="10" fill="#241f33" stroke="#bf5af2" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="785" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 3</text>
    <text x="785" y="214" fill="#bf5af2" font-size="13" font-weight="700" text-anchor="middle">OBSERVER</text>
    <text x="785" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-c · syncs, not electable</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5625;0.68;1" dur="16s" repeatCount="indefinite"/>
    <rect x="700" y="160" width="170" height="110" rx="10" fill="#16281f" stroke="#30d158" stroke-width="2.5"/>
    <text x="785" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 3</text>
    <text x="785" y="214" fill="#30d158" font-size="13" font-weight="700" text-anchor="middle">ISR MEMBER</text>
    <text x="785" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-c · electable ✓</text>
  </g>

  <!-- ===== Replication flows ===== -->
  <!-- leader -> follower (ISR replication) -->
  <line x1="280" y1="215" x2="395" y2="215" stroke="#3d4f66" stroke-width="1.5"/>
  <circle r="4.5" fill="#4dabf7">
    <animateMotion path="M280,215 L395,215" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- leader -> observer (dashed flow while observer) -->
  <g>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5625;0.68;1" dur="16s" repeatCount="indefinite"/>
    <path d="M285,272 C 430,325 555,325 700,262" fill="none" stroke="#bf5af2" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.7"/>
    <circle r="3.5" fill="#bf5af2">
      <animateMotion path="M285,272 C 430,325 555,325 700,262" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#bf5af2">
      <animateMotion path="M285,272 C 430,325 555,325 700,262" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- same path turns solid green once inside ISR -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5625;0.68;1" dur="16s" repeatCount="indefinite"/>
    <path d="M285,272 C 430,325 555,325 700,262" fill="none" stroke="#30d158" stroke-width="1.5"/>
    <circle r="4.5" fill="#30d158">
      <animateMotion path="M285,272 C 430,325 555,325 700,262" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== Bottom detail panels (one per phase) ===== -->
  <!-- STEP 1: terminal + file icon -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1875;0.21;0.355;0.375;1" dur="16s" repeatCount="indefinite"/>
    <rect x="200" y="380" width="470" height="92" rx="8" fill="#0d1420" stroke="#d29922" stroke-width="1.5"/>
    <circle cx="220" cy="398" r="4.5" fill="#ff453a"/><circle cx="236" cy="398" r="4.5" fill="#d29922"/><circle cx="252" cy="398" r="4.5" fill="#30d158"/>
    <text x="220" y="428" fill="#e6edf3" font-size="13" font-family="ui-monospace,Menlo,monospace">$ echo "" &gt; observer.ids    # remove broker 3's id</text>
    <text x="220" y="452" fill="#9fb0c3" font-size="11" font-family="ui-monospace,Menlo,monospace"># on ALL brokers + controllers, atomically (write tmp → mv)</text>
    <!-- file icon -->
    <path d="M710,388 h48 l16,16 v56 h-64 z" fill="#241f33" stroke="#bf5af2" stroke-width="2">
      <animate attributeName="stroke-width" values="2;3.5;2;3.5;2" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M758,388 v16 h16" fill="none" stroke="#bf5af2" stroke-width="2"/>
    <text x="742" y="480" fill="#bf5af2" font-size="11.5" font-weight="700" text-anchor="middle">observer.ids</text>
    <text x="742" y="432" fill="#9fb0c3" font-size="10" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">3 → ∅</text>
  </g>

  <!-- STEP 2: cache refresh + fetch + gate -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.375;0.395;0.54;0.5625;1" dur="16s" repeatCount="indefinite"/>
    <rect x="120" y="378" width="760" height="96" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <!-- cache refresh icon -->
    <g transform="translate(190,426)">
      <path d="M-16,0 A16,16 0 1 1 11,11" fill="none" stroke="#58a6ff" stroke-width="3">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M8,18 L16,8 L4,6 z" fill="#58a6ff"/>
    </g>
    <text x="240" y="420" fill="#e6edf3" font-size="13" font-weight="700">ObserverIds cache refresh</text>
    <text x="240" y="440" fill="#9fb0c3" font-size="11">5 s TTL expires → re-reads file</text>
    <!-- fetch arrow, flashing -->
    <g>
      <animate attributeName="opacity" values="1;0.25;1;0.25;1" dur="1s" repeatCount="indefinite"/>
      <path d="M430,426 L560,426" stroke="#58a6ff" stroke-width="2.5"/>
      <path d="M560,426 l-10,-6 v12 z" fill="#58a6ff"/>
    </g>
    <text x="495" y="412" fill="#58a6ff" font-size="11.5" text-anchor="middle">next follower fetch</text>
    <text x="495" y="448" fill="#9fb0c3" font-size="10.5" text-anchor="middle">maybeExpandIsr()</text>
    <!-- gate: red -> green -->
    <rect x="590" y="398" width="264" height="56" rx="8" fill="#0d1420" stroke="#3d4f66"/>
    <circle cx="616" cy="426" r="9" fill="#ff453a">
      <animate attributeName="fill" values="#ff453a;#ff453a;#30d158;#30d158" keyTimes="0;0.455;0.475;1" dur="16s" repeatCount="indefinite"/>
    </circle>
    <text x="636" y="421" fill="#e6edf3" font-size="12.5" font-weight="700" font-family="ui-monospace,Menlo,monospace">canAddReplicaToIsr()</text>
    <text x="636" y="440" fill="#ff453a" font-size="11" font-weight="700">gate CLOSED
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.455;0.475;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="636" y="440" fill="#30d158" font-size="11" font-weight="700" opacity="0">gate OPEN
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.455;0.475;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- STEP 3: native expansion note -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5625;0.585;0.79;0.8125;1" dur="16s" repeatCount="indefinite"/>
    <rect x="180" y="388" width="640" height="76" rx="8" fill="#20293a" stroke="#30d158"/>
    <text x="500" y="420" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">AlterPartition → controller adds broker 3 to ISR</text>
    <text x="500" y="444" fill="#9fb0c3" font-size="12" text-anchor="middle">100% stock Kafka machinery — the patch only opened the gate</text>
  </g>

  <!-- STEP 4: results -->
  <g opacity="0" text-anchor="middle">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.8125;0.835;0.99;1" dur="16s" repeatCount="indefinite"/>
    <text x="500" y="418" fill="#30d158" font-size="22" font-weight="800">Can be elected ✓   Zero restart ✓   Zero data movement ✓</text>
    <text x="500" y="448" fill="#9fb0c3" font-size="12.5">data was byte-identical all along — promotion is a metadata change, measured ~4–10 s end-to-end</text>
  </g>

  <!-- ===== Loop progress bar ===== -->
  <line x1="80" y1="545" x2="920" y2="545" stroke="#3d4f66" stroke-width="2"/>
  <g stroke="#3d4f66"><line x1="80" y1="540" x2="80" y2="550"/><line x1="237.5" y1="540" x2="237.5" y2="550"/><line x1="395" y1="540" x2="395" y2="550"/><line x1="552.5" y1="540" x2="552.5" y2="550"/><line x1="762.5" y1="540" x2="762.5" y2="550"/><line x1="920" y1="540" x2="920" y2="550"/></g>
  <g fill="#9fb0c3" font-size="10" text-anchor="middle">
    <text x="80" y="568">0 s</text><text x="237.5" y="568">3 s · edit file</text><text x="395" y="568">6 s · cache + gate</text><text x="552.5" y="568">9 s · ISR expands</text><text x="762.5" y="568">13 s · done</text><text x="920" y="568">16 s ↺</text>
  </g>
  <circle cy="545" r="5" fill="#e6edf3">
    <animate attributeName="cx" values="80;920" dur="16s" repeatCount="indefinite"/>
  </circle>
</svg>
