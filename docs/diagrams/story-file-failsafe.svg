<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Story animation: observer.ids fail-safe, 14 s loop.
       Three side-by-side mini-theaters, each with its own inject → absorb → verdict cycle.
       Shared phases (fraction of 14 s): 0-0.14 steady / 0.14-0.5 inject / 0.5-0.86 absorbed / 0.86-1 verdict -->
  <rect x="0" y="0" width="1000" height="640" rx="12" fill="#1a2332"/>
  <text x="30" y="34" fill="#e6edf3" font-size="19" font-weight="700">Story · observer.ids fail-safe — three real injections, zero broker casualties</text>
  <text x="970" y="34" fill="#9fb0c3" font-size="12" text-anchor="end">14 s loop · playbook S6/S7, real-machine (Tokyo)</text>

  <!-- ===== Shared phase banner ===== -->
  <g font-size="20" font-weight="800" text-anchor="middle">
    <text x="500" y="76" fill="#9fb0c3" opacity="0">STEP 0 · Healthy — every node reads observer.ids every 5 s
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.12;0.14;1" dur="14s" repeatCount="indefinite"/></text>
    <text x="500" y="76" fill="#ff453a" opacity="0">STEP 1 · Inject — break the file three different ways, on live brokers
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.14;0.16;0.48;0.50;1" dur="14s" repeatCount="indefinite"/></text>
    <text x="500" y="76" fill="#30d158" opacity="0">STEP 2 · Absorbed — every failure mode degrades safely, nothing crashes
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.52;0.84;0.86;1" dur="14s" repeatCount="indefinite"/></text>
    <text x="500" y="76" fill="#30d158" opacity="0">The file can never take a broker down
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.86;0.88;0.99;1" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="font-size" values="20;26;26;26;20" keyTimes="0;0.86;0.88;0.99;1" dur="14s" repeatCount="indefinite"/></text>
  </g>

  <!-- ============================================================ -->
  <!-- Theater 1: chmod 000 (permission denied)                     -->
  <!-- ============================================================ -->
  <g>
    <rect x="30" y="100" width="300" height="420" rx="10" fill="#1f2a3a" stroke="#3d4f66" stroke-width="1.5"/>
    <text x="180" y="128" fill="#e6edf3" font-size="14" font-weight="800" text-anchor="middle">① Unreadable — chmod 000</text>

    <!-- file icon with lock -->
    <path d="M150,150 h40 l14,14 v48 h-54 z" fill="#241f33" stroke="#bf5af2" stroke-width="2"/>
    <path d="M190,150 v14 h14" fill="none" stroke="#bf5af2" stroke-width="2"/>
    <text x="177" y="196" fill="#9fb0c3" font-size="10" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">3</text>
    <!-- lock icon fades in on inject -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/>
      <rect x="196" y="188" width="26" height="20" rx="4" fill="#2b1518" stroke="#ff453a" stroke-width="2"/>
      <path d="M201,188 v-6 a8 8 0 0 1 16 0 v6" fill="none" stroke="#ff453a" stroke-width="2"/>
      <circle cx="209" cy="198" r="3" fill="#ff453a"/>
    </g>
    <text x="180" y="232" fill="#bf5af2" font-size="11" font-weight="700" text-anchor="middle">observer.ids</text>

    <!-- inject command -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/>
      <rect x="50" y="248" width="260" height="30" rx="6" fill="#0d1420" stroke="#ff453a" stroke-width="1.2"/>
      <text x="62" y="268" fill="#ff453a" font-size="12" font-family="ui-monospace,Menlo,monospace">$ chmod 000 observer.ids</text>
    </g>

    <!-- broker keeps running -->
    <rect x="90" y="300" width="180" height="80" rx="10" fill="#223044" stroke="#30d158" stroke-width="2"/>
    <text x="180" y="330" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">broker 4 (leader)</text>
    <text x="180" y="352" fill="#30d158" font-size="11.5" font-weight="700" text-anchor="middle">still running ✓</text>
    <circle cx="180" cy="368" r="4" fill="#30d158">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- mechanism: WARN + cached value -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.54;0.97;1" dur="14s" repeatCount="indefinite"/>
      <rect x="50" y="398" width="260" height="62" rx="6" fill="#0d1420" stroke="#d29922" stroke-width="1.2"/>
      <text x="62" y="418" fill="#d29922" font-size="10.5" font-family="ui-monospace,Menlo,monospace">WARN Failed to read observer ids,</text>
      <text x="62" y="434" fill="#d29922" font-size="10.5" font-family="ui-monospace,Menlo,monospace">     keeping last value Set(3)</text>
      <text x="62" y="452" fill="#9fb0c3" font-size="10.5">→ keeps last cached value · never throws</text>
    </g>
    <text x="180" y="495" fill="#30d158" font-size="12.5" font-weight="800" text-anchor="middle" opacity="0">ISR unchanged · 100/100 writes acked
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.54;0.97;1" dur="14s" repeatCount="indefinite"/></text>
  </g>

  <!-- ============================================================ -->
  <!-- Theater 2: garbage content                                   -->
  <!-- ============================================================ -->
  <g>
    <rect x="350" y="100" width="300" height="420" rx="10" fill="#1f2a3a" stroke="#3d4f66" stroke-width="1.5"/>
    <text x="500" y="128" fill="#e6edf3" font-size="14" font-weight="800" text-anchor="middle">② Garbage content</text>

    <!-- file icon: clean content, then garbage overlay -->
    <path d="M470,150 h40 l14,14 v48 h-54 z" fill="#241f33" stroke="#bf5af2" stroke-width="2"/>
    <path d="M510,150 v14 h14" fill="none" stroke="#bf5af2" stroke-width="2"/>
    <text x="497" y="184" fill="#9fb0c3" font-size="10" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">3
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/></text>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/>
      <text x="497" y="180" fill="#ff453a" font-size="9.5" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">banana,3</text>
      <text x="497" y="194" fill="#ff453a" font-size="9.5" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">%%@@!!</text>
    </g>
    <text x="500" y="232" fill="#bf5af2" font-size="11" font-weight="700" text-anchor="middle">observer.ids</text>

    <!-- inject command -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/>
      <rect x="370" y="248" width="260" height="30" rx="6" fill="#0d1420" stroke="#ff453a" stroke-width="1.2"/>
      <text x="382" y="268" fill="#ff453a" font-size="12" font-family="ui-monospace,Menlo,monospace">$ echo 'banana,3 %%@@!!' &gt; file</text>
    </g>

    <!-- parser funnel -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.54;0.97;1" dur="14s" repeatCount="indefinite"/>
      <path d="M440,300 L560,300 L520,340 L480,340 Z" fill="#223044" stroke="#4dabf7" stroke-width="1.5"/>
      <text x="500" y="323" fill="#4dabf7" font-size="10.5" font-weight="700" text-anchor="middle">parser</text>
      <!-- garbage tokens bounce off, "3" passes through -->
      <text x="446" y="294" fill="#ff453a" font-size="10" font-family="ui-monospace,Menlo,monospace">banana ✗</text>
      <text x="522" y="294" fill="#ff453a" font-size="10" font-family="ui-monospace,Menlo,monospace">%%@@ ✗</text>
      <text x="500" y="362" fill="#30d158" font-size="12" font-weight="800" text-anchor="middle">3 ✓ → Set(3)</text>
    </g>

    <!-- broker keeps running -->
    <rect x="410" y="380" width="180" height="66" rx="10" fill="#223044" stroke="#30d158" stroke-width="2"/>
    <text x="500" y="407" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">broker 4 (leader)</text>
    <text x="500" y="428" fill="#30d158" font-size="11.5" font-weight="700" text-anchor="middle">still running ✓</text>

    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.54;0.97;1" dur="14s" repeatCount="indefinite"/>
      <text x="500" y="470" fill="#9fb0c3" font-size="11" text-anchor="middle">illegal tokens silently dropped · no flap</text>
      <text x="500" y="495" fill="#30d158" font-size="12.5" font-weight="800" text-anchor="middle">ISR unchanged · 100/100 writes acked</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- Theater 3: inconsistent across nodes                         -->
  <!-- ============================================================ -->
  <g>
    <rect x="670" y="100" width="300" height="420" rx="10" fill="#1f2a3a" stroke="#3d4f66" stroke-width="1.5"/>
    <text x="820" y="128" fill="#e6edf3" font-size="14" font-weight="800" text-anchor="middle">③ Nodes disagree</text>

    <!-- two small files: brokers (cleared) vs controllers (still 3) -->
    <g>
      <path d="M715,150 h34 l12,12 v42 h-46 z" fill="#241f33" stroke="#bf5af2" stroke-width="2"/>
      <text x="738" y="182" fill="#9fb0c3" font-size="9.5" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">3
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/></text>
      <text x="738" y="182" fill="#ff453a" font-size="9.5" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" opacity="0">∅
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/></text>
      <text x="738" y="222" fill="#9fb0c3" font-size="10" text-anchor="middle">brokers' copy</text>
    </g>
    <g>
      <path d="M885,150 h34 l12,12 v42 h-46 z" fill="#241f33" stroke="#bf5af2" stroke-width="2"/>
      <text x="908" y="182" fill="#9fb0c3" font-size="9.5" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">3</text>
      <text x="908" y="222" fill="#9fb0c3" font-size="10" text-anchor="middle">controllers' copy</text>
    </g>
    <text x="820" y="188" fill="#ff453a" font-size="15" font-weight="800" text-anchor="middle" opacity="0">≠
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/></text>

    <!-- inject -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.18;0.97;1" dur="14s" repeatCount="indefinite"/>
      <rect x="690" y="248" width="260" height="30" rx="6" fill="#0d1420" stroke="#ff453a" stroke-width="1.2"/>
      <text x="702" y="268" fill="#ff453a" font-size="11.5" font-family="ui-monospace,Menlo,monospace"># cleared on brokers only (botched)</text>
    </g>

    <!-- controller shield rejecting AlterPartition -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.54;0.86;0.88;1" dur="14s" repeatCount="indefinite"/>
      <!-- broker proposes -->
      <text x="742" y="308" fill="#9fb0c3" font-size="10.5" text-anchor="middle">broker proposes</text>
      <text x="742" y="322" fill="#9fb0c3" font-size="10.5" text-anchor="middle">ISR += 3</text>
      <circle r="4" fill="#4dabf7">
        <animateMotion path="M742,332 L800,352" dur="1.3s" repeatCount="indefinite"/>
      </circle>
      <!-- shield -->
      <path d="M820,332 l24,10 v20 q0,20 -24,30 q-24,-10 -24,-30 v-20 z" fill="#16281f" stroke="#30d158" stroke-width="2.5">
        <animate attributeName="stroke-width" values="2.5;4;2.5" dur="1.3s" repeatCount="indefinite"/>
      </path>
      <text x="820" y="368" fill="#30d158" font-size="13" font-weight="800" text-anchor="middle">✋</text>
      <text x="820" y="412" fill="#30d158" font-size="10.5" font-weight="700" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">controller: INELIGIBLE_REPLICA</text>
      <text x="820" y="430" fill="#9fb0c3" font-size="10.5" text-anchor="middle">committed ISR never changed</text>
    </g>

    <!-- self-heal after files aligned -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.86;0.88;0.97;1" dur="14s" repeatCount="indefinite"/>
      <text x="820" y="360" fill="#30d158" font-size="13" font-weight="800" text-anchor="middle">files aligned → self-healed</text>
      <text x="820" y="382" fill="#9fb0c3" font-size="11" text-anchor="middle">replica admitted 5.8 s later, zero restarts</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.54;0.97;1" dur="14s" repeatCount="indefinite"/>
      <text x="820" y="470" fill="#9fb0c3" font-size="11" text-anchor="middle">disagreement can only keep replicas OUT,</text>
      <text x="820" y="486" fill="#9fb0c3" font-size="11" text-anchor="middle">never let one in — fail-safe by construction</text>
    </g>
  </g>

  <!-- ===== Verdict band ===== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.86;0.88;0.99;1" dur="14s" repeatCount="indefinite"/>
    <rect x="120" y="536" width="760" height="44" rx="10" fill="#16281f" stroke="#30d158" stroke-width="2"/>
    <text x="500" y="564" fill="#30d158" font-size="17" font-weight="800" text-anchor="middle">no injection crashed a process or moved the ISR — worst case: state freezes safely</text>
  </g>

  <!-- ===== Timeline + legend ===== -->
  <g font-size="10.5" fill="#9fb0c3">
    <line x1="120" y1="600" x2="700" y2="600" stroke="#3d4f66" stroke-width="2"/>
    <g stroke="#3d4f66" stroke-width="2">
      <line x1="120" y1="594" x2="120" y2="606"/><line x1="201" y1="594" x2="201" y2="606"/>
      <line x1="410" y1="594" x2="410" y2="606"/><line x1="619" y1="594" x2="619" y2="606"/>
      <line x1="700" y1="594" x2="700" y2="606"/>
    </g>
    <text x="160" y="622" text-anchor="middle">0 healthy</text>
    <text x="305" y="622" text-anchor="middle">1 inject × 3</text>
    <text x="514" y="622" text-anchor="middle">2 absorbed</text>
    <text x="660" y="622" text-anchor="middle">verdict</text>
    <circle r="6" fill="#4dabf7">
      <animateMotion path="M120,600 L700,600" dur="14s" repeatCount="indefinite"/>
    </circle>
    <text x="880" y="622" text-anchor="end">evidence: scenario-playbook.md §S6–S7</text>
  </g>
</svg>
