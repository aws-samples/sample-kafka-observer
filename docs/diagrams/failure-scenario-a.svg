<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Scenario A: one primary AZ lost -> fail-stop -> promote observer -> writes resume. 16s loop:
       phase1 steady 0-25%, phase2 AZ down 25-50%, phase3 promotion 50-75%, phase4 recovered 75-100% -->
  <defs>
    <marker id="farrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="540" rx="12" fill="#1a2332"/>
  <text x="30" y="40" fill="#e6edf3" font-size="20" font-weight="700">Scenario A — one primary AZ lost: fail-stop, promote, resume (RPO = 0)</text>
  <text x="30" y="62" fill="#9fb0c3" font-size="12.5">min.insync.replicas=2, RF=3 (2 electable + 1 observer). Loops through 4 phases; wall-clock target ≤1 minute end-to-end, ISR recovery measured ≤10 s.</text>

  <!-- phase banner -->
  <g font-size="15" font-weight="700" text-anchor="middle">
    <text x="500" y="98" fill="#3fb950">Phase 1 — steady state: writes flow, observer syncs silently
      <animate attributeName="opacity" values="1;1;0;0;0;0;0;0;1" keyTimes="0;0.23;0.25;0.4;0.5;0.75;0.9;0.98;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="98" fill="#f85149" opacity="0">Phase 2 — AZ-b dies: ISR shrinks below minISR → producers get NOT_ENOUGH_REPLICAS (fail-stop, no silent loss)
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.24;0.26;0.48;0.5;0.9;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="98" fill="#d29922" opacity="0">Phase 3 — operator deletes observer id from the file → gate opens → native ISR expand (≤10 s)
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.49;0.51;0.73;0.75;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="500" y="98" fill="#3fb950" opacity="0">Phase 4 — ISR back to size 2: writes resume automatically. Zero data movement — the log was byte-identical all along
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.76;0.97;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- Producer -->
  <g>
    <rect x="30" y="220" width="110" height="64" rx="10" fill="#223044" stroke="#3d4f66"/>
    <text x="85" y="247" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Producer</text>
    <text x="85" y="266" fill="#9fb0c3" font-size="10.5" text-anchor="middle">acks=all</text>
    <!-- red halo while blocked (phase 2-3) -->
    <rect x="30" y="220" width="110" height="64" rx="10" fill="none" stroke="#f85149" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.73;0.76;1" dur="16s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="85" y="308" fill="#f85149" font-size="10.5" font-weight="700" text-anchor="middle" opacity="0">NOT_ENOUGH_REPLICAS
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.73;0.76;1" dur="16s" repeatCount="indefinite"/></text>

  <!-- Broker 2 leader (AZ-a) -->
  <g>
    <rect x="250" y="130" width="200" height="110" rx="10" fill="#223044" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="350" y="156" fill="#58a6ff" font-size="13.5" font-weight="700" text-anchor="middle">Broker 2 — Leader (AZ-a)</text>
    <text x="350" y="178" fill="#e6edf3" font-size="11" text-anchor="middle">survives</text>
    <text x="350" y="200" fill="#9fb0c3" font-size="10.5" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      Isr: 2,3
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.24;0.26;0.98;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="350" y="200" fill="#f85149" font-size="10.5" font-weight="700" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" opacity="0">
      Isr: 2  (&lt; minISR!)
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.71;0.74;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="350" y="200" fill="#3fb950" font-size="10.5" font-weight="700" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" opacity="0">
      Isr: 2,1  ✓ writes resume
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.73;0.76;0.97;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- Broker 3 follower (AZ-b) - dies in phase 2 -->
  <g>
    <rect x="600" y="130" width="200" height="110" rx="10" fill="#223044" stroke="#3fb950" stroke-width="1.5">
      <animate attributeName="stroke" values="#3fb950;#3fb950;#f85149;#f85149;#3fb950" keyTimes="0;0.24;0.26;0.97;1" dur="16s" repeatCount="indefinite"/>
    </rect>
    <g>
      <animate attributeName="opacity" values="1;1;0.3;0.3;1" keyTimes="0;0.24;0.27;0.97;1" dur="16s" repeatCount="indefinite"/>
      <text x="700" y="156" fill="#3fb950" font-size="13.5" font-weight="700" text-anchor="middle">Broker 3 — Follower (AZ-b)</text>
      <text x="700" y="178" fill="#e6edf3" font-size="11" text-anchor="middle">in ISR, electable</text>
    </g>
    <text x="700" y="205" fill="#f85149" font-size="14" font-weight="800" text-anchor="middle" opacity="0">✖ AZ DOWN
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.24;0.27;0.97;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- Broker 1 observer (AZ-c) - promoted in phase 3 -->
  <g>
    <rect x="600" y="330" width="200" height="130" rx="10" fill="#223044" stroke="#bc8cff" stroke-width="1.5">
      <animate attributeName="stroke" values="#bc8cff;#bc8cff;#bc8cff;#3fb950;#3fb950;#bc8cff" keyTimes="0;0.5;0.6;0.65;0.97;1" dur="16s" repeatCount="indefinite"/>
    </rect>
    <text x="700" y="356" fill="#bc8cff" font-size="13.5" font-weight="700" text-anchor="middle">Broker 1 — Observer (AZ-c)
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.6;0.63;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="700" y="356" fill="#3fb950" font-size="13.5" font-weight="700" text-anchor="middle" opacity="0">Broker 1 — PROMOTED ✓
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.61;0.64;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="700" y="378" fill="#e6edf3" font-size="11" text-anchor="middle">log byte-identical to leader</text>
    <text x="700" y="396" fill="#9fb0c3" font-size="10.5" text-anchor="middle">was fetching continuously —</text>
    <text x="700" y="411" fill="#9fb0c3" font-size="10.5" text-anchor="middle">no catch-up copy needed</text>
    <text x="700" y="440" fill="#9fb0c3" font-size="10.5" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">not in ISR
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.6;0.63;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="700" y="440" fill="#3fb950" font-size="10.5" font-weight="700" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" opacity="0">in ISR — counts for acks=all
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.61;0.64;0.97;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- Operator action (phase 3) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.53;0.73;0.78" dur="16s" repeatCount="indefinite"/>
    <rect x="250" y="330" width="230" height="80" rx="10" fill="#2d2a1c" stroke="#d29922" stroke-width="1.5"/>
    <text x="365" y="354" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">Operator (one command)</text>
    <text x="365" y="374" fill="#e6edf3" font-size="10.5" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">remove "1" from observer.ids</text>
    <text x="365" y="392" fill="#9fb0c3" font-size="10" text-anchor="middle">tmp + mv, on ALL surviving brokers</text>
    <path d="M480,370 L595,388" stroke="#d29922" stroke-width="2" fill="none" marker-end="url(#farrB)"/>
  </g>

  <!-- produce flow dots: green in phase 1 & 4 -->
  <path id="fpProd" d="M140,250 L250,200" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#farrB)"/>
  <circle r="4" fill="#3fb950">
    <animateMotion dur="1.3s" repeatCount="indefinite"><mpath href="#fpProd"/></animateMotion>
    <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.24;0.26;0.74;0.76;1" dur="16s" repeatCount="indefinite"/>
  </circle>
  <!-- blocked X in phase 2-3 -->
  <text x="195" y="218" fill="#f85149" font-size="18" font-weight="800" opacity="0">✖
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.73;0.76;1" dur="16s" repeatCount="indefinite"/></text>

  <!-- ISR replication leader->follower: alive phase 1 only -->
  <path id="fpIsr" d="M450,185 L600,185" stroke="#3fb950" stroke-width="2.5" fill="none"/>
  <circle r="4.5" fill="#3fb950">
    <animateMotion dur="1.3s" repeatCount="indefinite"><mpath href="#fpIsr"/></animateMotion>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.24;0.26;0.98;1" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- observer replication leader->observer: purple dashed phase 1-2, green solid dots after promotion -->
  <path id="fpObs" d="M440,240 C520,290 540,350 600,380" stroke="#bc8cff" stroke-width="2.5" stroke-dasharray="7 5" fill="none">
    <animate attributeName="stroke" values="#bc8cff;#bc8cff;#bc8cff;#3fb950;#3fb950;#bc8cff" keyTimes="0;0.5;0.6;0.65;0.97;1" dur="16s" repeatCount="indefinite"/>
  </path>
  <circle r="4.5" fill="#bc8cff">
    <animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#fpObs"/></animateMotion>
    <animate attributeName="fill" values="#bc8cff;#bc8cff;#bc8cff;#3fb950;#3fb950;#bc8cff" keyTimes="0;0.5;0.6;0.65;0.97;1" dur="16s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" fill="#3fb950" opacity="0">
    <animateMotion dur="1.6s" begin="0.8s" repeatCount="indefinite"><mpath href="#fpObs"/></animateMotion>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.66;0.97;1" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- timeline -->
  <g>
    <line x1="60" y1="490" x2="940" y2="490" stroke="#3d4f66" stroke-width="2"/>
    <!-- phase segments -->
    <rect x="60" y="486" width="220" height="8" rx="4" fill="#3fb950" opacity="0.6"/>
    <rect x="280" y="486" width="220" height="8" rx="4" fill="#f85149" opacity="0.6"/>
    <rect x="500" y="486" width="220" height="8" rx="4" fill="#d29922" opacity="0.6"/>
    <rect x="720" y="486" width="220" height="8" rx="4" fill="#3fb950" opacity="0.6"/>
    <text x="170" y="514" fill="#3fb950" font-size="10.5" text-anchor="middle">steady · Isr: 2,3</text>
    <text x="390" y="514" fill="#f85149" font-size="10.5" text-anchor="middle">AZ-b down · Isr: 2 · writes fail-stop</text>
    <text x="610" y="514" fill="#d29922" font-size="10.5" text-anchor="middle">promote · file edit → ISR expand ≤10 s</text>
    <text x="830" y="514" fill="#3fb950" font-size="10.5" text-anchor="middle">recovered · Isr: 2,1 · RPO = 0</text>
    <!-- moving playhead synced to the 16s loop -->
    <circle r="5" fill="#e6edf3">
      <animateMotion path="M60,490 L940,490" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="30" y="534" fill="#5b6b80" font-size="10">Real-machine run: docs/runbooks/scenario-a-az-loss.md · when AZ-b returns, broker 3 auto-rejoins ISR and the observer is demoted back with one more file edit (≤10–20 s).</text>
</svg>
