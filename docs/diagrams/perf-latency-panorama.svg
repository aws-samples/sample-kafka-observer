<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Latency panorama — five measured points on one ruler">
  <title>Latency panorama — observer adds zero drag (real-hardware p50, acks=all, RF3)</title>

  <rect x="0" y="0" width="1000" height="300" rx="12" fill="#1a2332"/>

  <text x="30" y="38" fill="#e6edf3" font-size="20" font-weight="700">Latency panorama — 5 real-hardware points on one ruler</text>
  <text x="30" y="60" fill="#9fb0c3" font-size="12.5">p50 produce latency, acks=all · Observer 2.04–2.35 ms sits ON the ZK RF3 baseline (2.33 ms) — only a misplaced leader hurts (5.42 ms)</text>

  <!-- ===== axis: 0–6 ms, x = 80 + ms*140 ===== -->
  <g>
    <line x1="80" y1="155" x2="930" y2="155" stroke="#3d4f66" stroke-width="2"/>
    <path d="M930,155 l-10,-5 v10 z" fill="#3d4f66"/>
    <g stroke="#3d4f66" stroke-width="1.5">
      <line x1="80"  y1="150" x2="80"  y2="160"/>
      <line x1="220" y1="150" x2="220" y2="160"/>
      <line x1="360" y1="150" x2="360" y2="160"/>
      <line x1="500" y1="150" x2="500" y2="160"/>
      <line x1="640" y1="150" x2="640" y2="160"/>
      <line x1="780" y1="150" x2="780" y2="160"/>
      <line x1="920" y1="150" x2="920" y2="160"/>
    </g>
    <g fill="#7d8ea3" font-size="10.5" text-anchor="middle">
      <text x="80"  y="178">0 ms</text>
      <text x="220" y="178">1 ms</text>
      <text x="360" y="178">2 ms</text>
      <text x="500" y="178">3 ms</text>
      <text x="640" y="178">4 ms</text>
      <text x="780" y="178">5 ms</text>
      <text x="920" y="178">6 ms</text>
    </g>
    <!-- radar sweep along the ruler -->
    <circle r="3" fill="#58a6ff" opacity="0.35">
      <animateMotion dur="5s" repeatCount="indefinite" path="M80,155 L920,155"/>
    </circle>
  </g>

  <!-- ===== point: CPG 1.01 ms (physical floor) ===== -->
  <g>
    <line x1="221.4" y1="163" x2="221.4" y2="196" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="221.4" cy="155" r="7" fill="#58a6ff" stroke="#1a2332" stroke-width="2"/>
    <text x="221.4" y="214" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">CPG · 1.01 ms</text>
    <text x="221.4" y="230" fill="#9fb0c3" font-size="11" text-anchor="middle">物理下限 / Physical floor</text>
    <text x="221.4" y="244" fill="#7d8ea3" font-size="9.5" text-anchor="middle">cluster placement group, RF1</text>
  </g>

  <!-- ===== point: same-AZ RF3 2.33 ms (label above axis to avoid crowding) ===== -->
  <g>
    <line x1="406.2" y1="147" x2="406.2" y2="112" stroke="#9fb0c3" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="406.2" cy="155" r="6" fill="#9fb0c3" stroke="#1a2332" stroke-width="2"/>
    <text x="406.2" y="90" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Same-AZ RF3 · 2.33 ms</text>
    <text x="406.2" y="105" fill="#9fb0c3" font-size="11" text-anchor="middle">ZK baseline</text>
  </g>

  <!-- ===== band: Observer 2.04–2.35 ms (green breathing + purple observer icon) ===== -->
  <g>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    <rect x="365.6" y="144" width="43.4" height="22" rx="6" fill="#30d158" opacity="0.28"/>
    <circle cx="387.3" cy="155" r="7" fill="#30d158" stroke="#1a2332" stroke-width="2"/>
    <line x1="387.3" y1="166" x2="387.3" y2="238" stroke="#30d158" stroke-width="1.5" stroke-dasharray="3 3"/>
    <!-- purple observer hexagon overlaid on the label -->
    <path d="M292,251 l7,4 v8 l-7,4 l-7,-4 v-8 z" fill="#bf5af2"/>
    <text x="292" y="263" fill="#ffffff" font-size="8" font-weight="700" text-anchor="middle">O</text>
    <text x="307" y="263" fill="#30d158" font-size="14" font-weight="800">Observer · 2.04–2.35 ms</text>
    <text x="307" y="280" fill="#9fb0c3" font-size="11">Observer: zero drag — 不在 ISR，不进 acks 关键路径</text>
  </g>

  <!-- ===== point: 3-AZ RF3 2.38 ms (recommended) ===== -->
  <g>
    <circle cx="413.2" cy="155" r="6" fill="#d29922" stroke="#1a2332" stroke-width="2"/>
    <path d="M413.2,163 L470,202" stroke="#d29922" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
    <text x="476" y="208" fill="#d29922" font-size="13" font-weight="700">3-AZ RF3 · 2.38 ms</text>
    <text x="476" y="224" fill="#9fb0c3" font-size="11">Recommended: AZ-tolerant（比同 AZ 仅 +0.05 ms）</text>
  </g>

  <!-- ===== point: leader in wrong AZ 5.42 ms ===== -->
  <g>
    <circle cx="838.8" cy="155" r="7" fill="#ff453a" stroke="#1a2332" stroke-width="2">
      <animate attributeName="opacity" values="1;0.45;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <line x1="838.8" y1="163" x2="838.8" y2="196" stroke="#ff453a" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="838.8" y="214" fill="#ff453a" font-size="13" font-weight="700" text-anchor="middle">Leader in wrong AZ! · 5.42 ms</text>
    <text x="838.8" y="230" fill="#9fb0c3" font-size="11" text-anchor="middle">每条消息都跨 AZ 两跳 — 唯一真正的坑</text>
    <text x="838.8" y="244" fill="#7d8ea3" font-size="9.5" text-anchor="middle">fix: rack-aware leadership, not more replicas</text>
  </g>

  <text x="970" y="290" fill="#5a6b7b" font-size="9.5" text-anchor="end">measured: ap-northeast-1 · acks=all · lower is better · linear scale</text>
</svg>
