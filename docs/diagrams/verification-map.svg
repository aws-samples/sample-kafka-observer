<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Verification map — 9 evidence domains, all PASS, radiating from the observer">
  <title>Verification map — 9 evidence domains around one observer, all PASS on real hardware</title>

  <rect x="0" y="0" width="1000" height="600" rx="12" fill="#1a2332"/>

  <text x="30" y="40" fill="#e6edf3" font-size="20" font-weight="700">Verification map — 9 evidence domains, 9/9 PASS（东京真机）</text>
  <text x="30" y="62" fill="#9fb0c3" font-size="12.5">每条辐射线 = 一份 evidence 报告；流动的数据点 = 该域对 observer 行为的持续验证</text>

  <!-- ===== radial lines (drawn first, under the nodes) ===== -->
  <g stroke="#3d4f66" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="500" y1="455" x2="126" y2="401"/>
    <line x1="500" y1="455" x2="171" y2="299"/>
    <line x1="500" y1="455" x2="256" y2="216"/>
    <line x1="500" y1="455" x2="370" y2="162"/>
    <line x1="500" y1="455" x2="500" y2="143"/>
    <line x1="500" y1="455" x2="630" y2="162"/>
    <line x1="500" y1="455" x2="744" y2="216"/>
    <line x1="500" y1="455" x2="829" y2="299"/>
    <line x1="500" y1="455" x2="874" y2="401"/>
  </g>

  <!-- ===== flowing verification dots (center -> domain) ===== -->
  <g fill="#30d158">
    <circle r="3.5"><animateMotion dur="2.8s" begin="0.0s" repeatCount="indefinite" path="M500,455 L126,401"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="0.3s" repeatCount="indefinite" path="M500,455 L171,299"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="0.6s" repeatCount="indefinite" path="M500,455 L256,216"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="0.9s" repeatCount="indefinite" path="M500,455 L370,162"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="1.2s" repeatCount="indefinite" path="M500,455 L500,143"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="1.5s" repeatCount="indefinite" path="M500,455 L630,162"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="1.8s" repeatCount="indefinite" path="M500,455 L744,216"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="2.1s" repeatCount="indefinite" path="M500,455 L829,299"/></circle>
    <circle r="3.5"><animateMotion dur="2.8s" begin="2.4s" repeatCount="indefinite" path="M500,455 L874,401"/></circle>
  </g>
  <!-- return dots (domain -> center, purple = evidence flowing back) -->
  <g fill="#bf5af2" opacity="0.8">
    <circle r="2.5"><animateMotion dur="3.4s" begin="1.4s" repeatCount="indefinite" path="M126,401 L500,455"/></circle>
    <circle r="2.5"><animateMotion dur="3.4s" begin="2.5s" repeatCount="indefinite" path="M370,162 L500,455"/></circle>
    <circle r="2.5"><animateMotion dur="3.4s" begin="0.4s" repeatCount="indefinite" path="M630,162 L500,455"/></circle>
    <circle r="2.5"><animateMotion dur="3.4s" begin="1.9s" repeatCount="indefinite" path="M874,401 L500,455"/></circle>
  </g>

  <!-- ===== center: observer hexagon ===== -->
  <g>
    <path d="M500,395 l52,30 v60 l-52,30 l-52,-30 v-60 z" fill="#2a1f3d" stroke="#bf5af2" stroke-width="3">
      <animate attributeName="stroke-width" values="3;4.5;3" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M500,411 l38,22 v44 l-38,22 l-38,-22 v-44 z" fill="none" stroke="#bf5af2" stroke-width="1" opacity="0.5"/>
    <text x="500" y="448" fill="#bf5af2" font-size="18" font-weight="800" text-anchor="middle">Observer</text>
    <text x="500" y="467" fill="#e6edf3" font-size="10.5" text-anchor="middle">byte-identical replica</text>
    <text x="500" y="481" fill="#9fb0c3" font-size="9.5" text-anchor="middle">never in ISR</text>
  </g>

  <!-- ===== domain nodes: box 150x64, icon + name + key number + green check ===== -->

  <!-- 1. Lifecycle -->
  <g>
    <rect x="51" y="369" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <path d="M68,382 a8,8 0 1,1 -0.1,0 z M68,382 l0,-6 M68,382 l5,3" stroke="#ff9900" stroke-width="1.6" fill="none"/>
    <text x="84" y="389" fill="#e6edf3" font-size="12.5" font-weight="700">Lifecycle</text>
    <text x="64" y="408" fill="#9fb0c3" font-size="10">promote 4–10 s · demote 9–12 s</text>
    <text x="64" y="423" fill="#9fb0c3" font-size="10">zero restart, zero data move</text>
    <text x="188" y="388" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 2. EOS-CRC -->
  <g>
    <rect x="96" y="267" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <path d="M107,275 h14 v12 l-7,5 l-7,-5 z" fill="none" stroke="#58a6ff" stroke-width="1.6"/>
    <path d="M110,283 l3,3 l6,-6" stroke="#58a6ff" stroke-width="1.6" fill="none"/>
    <text x="129" y="287" fill="#e6edf3" font-size="12.5" font-weight="700">EOS · CRC</text>
    <text x="109" y="306" fill="#9fb0c3" font-size="10">segment CRC byte-identical</text>
    <text x="109" y="321" fill="#9fb0c3" font-size="10">PID · epoch · offsets preserved</text>
    <text x="233" y="286" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 3. Transactions -->
  <g>
    <rect x="181" y="184" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <path d="M193,193 h16 M193,199 h16 M193,205 h10" stroke="#d29922" stroke-width="1.6"/>
    <text x="216" y="204" fill="#e6edf3" font-size="12.5" font-weight="700">Transactions</text>
    <text x="194" y="223" fill="#9fb0c3" font-size="10">txn markers survive promotion</text>
    <text x="194" y="238" fill="#9fb0c3" font-size="10">read_committed intact</text>
    <text x="318" y="203" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 4. MM2 control -->
  <g>
    <rect x="295" y="130" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <path d="M306,145 h18 M324,145 l-4,-3 m4,3 l-4,3 M324,152 h-18 m0,0 l4,-3 m-4,3 l4,3" stroke="#bc8cff" stroke-width="1.5" fill="none"/>
    <text x="331" y="150" fill="#e6edf3" font-size="12.5" font-weight="700">MM2 control</text>
    <text x="308" y="169" fill="#9fb0c3" font-size="10">heartbeats · checkpoints</text>
    <text x="308" y="184" fill="#9fb0c3" font-size="10">offset-sync records replicated</text>
    <text x="432" y="149" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 5. KRaft probe (top) -->
  <g>
    <rect x="425" y="111" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <circle cx="443" cy="126" r="7" fill="none" stroke="#58a6ff" stroke-width="1.6"/>
    <path d="M448,131 l6,6" stroke="#58a6ff" stroke-width="1.6"/>
    <text x="460" y="131" fill="#e6edf3" font-size="12.5" font-weight="700">KRaft probe</text>
    <text x="438" y="150" fill="#9fb0c3" font-size="10">same hook points located</text>
    <text x="438" y="165" fill="#9fb0c3" font-size="10">in KRaft code path</text>
    <text x="562" y="130" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 6. Multi-version -->
  <g>
    <rect x="555" y="130" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <path d="M566,138 h8 v8 h-8 z M578,146 h8 v8 h-8 z" fill="none" stroke="#ff9900" stroke-width="1.5"/>
    <text x="592" y="150" fill="#e6edf3" font-size="12.5" font-weight="700">Multi-version</text>
    <text x="568" y="169" fill="#9fb0c3" font-size="10">patch ports across ZK-era</text>
    <text x="568" y="184" fill="#9fb0c3" font-size="10">releases, same 2 hooks</text>
    <text x="692" y="149" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 7. Kafka 4.x -->
  <g>
    <rect x="669" y="184" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <text x="681" y="204" fill="#58a6ff" font-size="14" font-weight="800">4.x</text>
    <text x="708" y="203" fill="#e6edf3" font-size="12.5" font-weight="700">Kafka 4.x</text>
    <text x="682" y="223" fill="#9fb0c3" font-size="10">KRaft-only future mapped:</text>
    <text x="682" y="238" fill="#9fb0c3" font-size="10">concept carries forward</text>
    <text x="806" y="203" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 8. ELR -->
  <g>
    <rect x="754" y="267" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <circle cx="769" cy="284" r="7" fill="none" stroke="#30d158" stroke-width="1.6"/>
    <circle cx="769" cy="284" r="2.5" fill="#30d158"/>
    <text x="784" y="288" fill="#e6edf3" font-size="12.5" font-weight="700">ELR (KIP-966)</text>
    <text x="767" y="306" fill="#9fb0c3" font-size="10">observer never enters ELR —</text>
    <text x="767" y="321" fill="#9fb0c3" font-size="10">no unclean-election risk</text>
    <text x="891" y="286" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- 9. 8 failure scenarios -->
  <g>
    <rect x="799" y="369" width="150" height="64" rx="9" fill="#20293a" stroke="#3d4f66" stroke-width="1.5"/>
    <path d="M814,377 l4,7 h-8 z M810,391 h8 M814,377 v-2" stroke="#ff453a" stroke-width="1.5" fill="none"/>
    <text x="828" y="389" fill="#e6edf3" font-size="12.5" font-weight="700">8 failure scenarios</text>
    <text x="812" y="408" fill="#9fb0c3" font-size="10">detect ≤10 s · recover ≤14 s</text>
    <text x="812" y="423" fill="#9fb0c3" font-size="10">self-heal 5.8 s · 8/8 PASS</text>
    <text x="936" y="388" fill="#30d158" font-size="14" font-weight="800" text-anchor="end">✓</text>
  </g>

  <!-- ===== bottom-line verdict ===== -->
  <g>
    <rect x="340" y="545" width="320" height="34" rx="17" fill="#0f2a1a" stroke="#30d158" stroke-width="1.5">
      <animate attributeName="opacity" values="0.75;1;0.75" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <text x="500" y="567" fill="#30d158" font-size="14" font-weight="800" text-anchor="middle">9 / 9 evidence 全 PASS — 真机验证，非纸上推演</text>
  </g>
</svg>
