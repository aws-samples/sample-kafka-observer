<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Story animation: observer crash & recovery on the RF4 production topology
       (3 ISR members, one per AZ + broker 4 = observer, remote AZ/DC), 12 s loop
       Phases: 0-2 steady | 2-4.5 crash | 4.5-7.5 zero impact | 7.5-10 catch-up | 10-12 steady again -->
  <rect x="0" y="0" width="1000" height="600" rx="12" fill="#1a2332"/>
  <text x="30" y="34" fill="#e6edf3" font-size="19" font-weight="700">Story · Observer crash — the failure that does not matter</text>
  <text x="970" y="34" fill="#9fb0c3" font-size="12" text-anchor="end">12 s loop · RF4 production topology · measured on real EC2 (Tokyo), scenario S3</text>

  <!-- ===== Phase banners ===== -->
  <g font-size="21" font-weight="800" text-anchor="middle">
    <text x="500" y="80" fill="#9fb0c3" opacity="0">STEP 0 · Steady state — observer syncs quietly outside ISR
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.15;0.167;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#ff453a" opacity="0">STEP 1 · Observer crashes — kill -9, instance gone
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.167;0.19;0.355;0.375;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#30d158" opacity="0">STEP 2 · Nothing changes — ISR, leader, writes, latency: all untouched
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.375;0.4;0.605;0.625;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#bf5af2" opacity="0">STEP 3 · Observer restarts and catches up on its own
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.625;0.65;0.813;0.833;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="80" fill="#30d158" opacity="0">STEP 4 · Back to steady state — byte-identical after reconnect
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.833;0.855;0.99;1" dur="12s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== ISR boundary: NEVER moves (that's the story) ===== -->
  <rect x="85" y="120" width="600" height="185" rx="10" fill="none" stroke="#30d158" stroke-width="2"/>
  <text x="100" y="142" fill="#30d158" font-size="13" font-weight="700">ISR = {1, 2, 3}  — unchanged for the entire story</text>

  <!-- ===== Brokers ===== -->
  <g>
    <rect x="105" y="160" width="160" height="110" rx="10" fill="#223044" stroke="#ff9900" stroke-width="3"/>
    <text x="185" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 1</text>
    <text x="185" y="214" fill="#ff9900" font-size="13" font-weight="700" text-anchor="middle">LEADER</text>
    <text x="185" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-a · keeps acking</text>
  </g>
  <g>
    <rect x="305" y="160" width="160" height="110" rx="10" fill="#223044" stroke="#30d158" stroke-width="2"/>
    <text x="385" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 2</text>
    <text x="385" y="214" fill="#30d158" font-size="13" font-weight="700" text-anchor="middle">follower · in ISR</text>
    <text x="385" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-b</text>
  </g>
  <g>
    <rect x="505" y="160" width="160" height="110" rx="10" fill="#223044" stroke="#30d158" stroke-width="2"/>
    <text x="585" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 3</text>
    <text x="585" y="214" fill="#30d158" font-size="13" font-weight="700" text-anchor="middle">follower · in ISR</text>
    <text x="585" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">AZ-c</text>
  </g>
  <!-- broker 4: observer — dims + red X during crash window (2-7.5s), back at 7.5s -->
  <g>
    <animate attributeName="opacity" values="1;1;0.3;0.3;1;1" keyTimes="0;0.167;0.21;0.605;0.65;1" dur="12s" repeatCount="indefinite"/>
    <rect x="740" y="160" width="160" height="110" rx="10" fill="#241f33" stroke="#bf5af2" stroke-width="2" stroke-dasharray="7 5">
      <animate attributeName="stroke" values="#bf5af2;#bf5af2;#ff453a;#ff453a;#bf5af2;#bf5af2" keyTimes="0;0.167;0.21;0.605;0.65;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text x="820" y="192" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">broker 4</text>
    <text x="820" y="214" fill="#bf5af2" font-size="13" font-weight="700" text-anchor="middle">OBSERVER</text>
    <text x="820" y="236" fill="#9fb0c3" font-size="11" text-anchor="middle">remote AZ/DC · outside ISR</text>
  </g>
  <!-- red X over broker 4 during crash -->
  <g stroke="#ff453a" stroke-width="8" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.167;0.19;0.605;0.65;1" dur="12s" repeatCount="indefinite"/>
    <line x1="775" y1="180" x2="865" y2="250"/>
    <line x1="865" y1="180" x2="775" y2="250"/>
  </g>
  <text x="820" y="292" fill="#ff453a" font-size="12" font-weight="800" text-anchor="middle" opacity="0">DOWN
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.167;0.19;0.605;0.65;1" dur="12s" repeatCount="indefinite"/></text>

  <!-- ===== Data flows ===== -->
  <!-- producer -> leader: NEVER stops -->
  <text x="45" y="200" fill="#e6edf3" font-size="12" font-weight="700" text-anchor="middle">producer</text>
  <text x="45" y="216" fill="#9fb0c3" font-size="10" text-anchor="middle">acks=all</text>
  <line x1="62" y1="230" x2="105" y2="230" stroke="#3d4f66" stroke-width="1.5"/>
  <circle r="4.5" fill="#ff9900">
    <animateMotion path="M62,230 L105,230" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <!-- leader -> follower 2: NEVER stops -->
  <line x1="265" y1="215" x2="305" y2="215" stroke="#3d4f66" stroke-width="1.5"/>
  <circle r="4.5" fill="#4dabf7">
    <animateMotion path="M265,215 L305,215" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- leader -> follower 3: NEVER stops -->
  <path d="M265,255 C 340,300 435,300 505,250" fill="none" stroke="#3d4f66" stroke-width="1.5"/>
  <circle r="4.5" fill="#4dabf7">
    <animateMotion path="M265,255 C 340,300 435,300 505,250" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- leader -> observer: dashed purple, vanishes 2-7.5s, resumes fast (catch-up) 7.5-10s, normal after -->
  <path d="M270,272 C 450,345 610,335 740,262" fill="none" stroke="#bf5af2" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.7;0;0;0.7;0.7" keyTimes="0;0.167;0.19;0.605;0.65;1" dur="12s" repeatCount="indefinite"/>
  </path>
  <!-- normal-pace observer dots (steady phases only) -->
  <g>
    <animate attributeName="opacity" values="1;1;0;0;0;0;1;1" keyTimes="0;0.167;0.19;0.605;0.65;0.813;0.833;1" dur="12s" repeatCount="indefinite"/>
    <circle r="3.5" fill="#bf5af2">
      <animateMotion path="M270,272 C 450,345 610,335 740,262" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#bf5af2">
      <animateMotion path="M270,272 C 450,345 610,335 740,262" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- catch-up burst: fast dots during 7.5-10s only -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.65;0.66;0.8;0.813;1" dur="12s" repeatCount="indefinite"/>
    <circle r="4" fill="#bf5af2">
      <animateMotion path="M270,272 C 450,345 610,335 740,262" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#bf5af2">
      <animateMotion path="M270,272 C 450,345 610,335 740,262" dur="0.6s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#bf5af2">
      <animateMotion path="M270,272 C 450,345 610,335 740,262" dur="0.6s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="520" y="350" fill="#bf5af2" font-size="11.5" font-weight="700" text-anchor="middle">catching up…</text>
  </g>

  <!-- ===== Producer latency meter: needle never moves ===== -->
  <g>
    <rect x="120" y="380" width="300" height="90" rx="10" fill="#0d1420" stroke="#3d4f66"/>
    <text x="140" y="406" fill="#9fb0c3" font-size="11.5" font-weight="700">PRODUCER p50 LATENCY</text>
    <text x="140" y="448" fill="#30d158" font-size="30" font-weight="800" font-family="ui-monospace,Menlo,monospace">2.0 ms</text>
    <text x="270" y="448" fill="#9fb0c3" font-size="11">← does not flinch</text>
    <!-- flat sparkline -->
    <polyline points="140,460 160,459 180,460 200,461 220,460 240,459 260,460 280,461 300,460 320,459 340,460 360,461 380,460 400,460" fill="none" stroke="#30d158" stroke-width="1.5"/>
  </g>
  <!-- writes status: always OK -->
  <g>
    <rect x="450" y="380" width="240" height="90" rx="10" fill="#0d1420" stroke="#3d4f66"/>
    <text x="470" y="406" fill="#9fb0c3" font-size="11.5" font-weight="700">WRITES (acks=all)</text>
    <circle cx="482" cy="438" r="8" fill="#30d158">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="500" y="443" fill="#30d158" font-size="18" font-weight="800">FLOWING</text>
    <text x="470" y="464" fill="#9fb0c3" font-size="10.5">observer never counted for acks</text>
  </g>
  <!-- data check panel -->
  <g>
    <rect x="720" y="380" width="230" height="90" rx="10" fill="#0d1420" stroke="#3d4f66"/>
    <text x="740" y="406" fill="#9fb0c3" font-size="11.5" font-weight="700">AFTER RECONNECT</text>
    <text x="740" y="432" fill="#e6edf3" font-size="12.5">log verified</text>
    <text x="740" y="454" fill="#30d158" font-size="14" font-weight="800">byte-identical ✓
      <animate attributeName="opacity" values="0.35;0.35;1;1" keyTimes="0;0.813;0.855;1" dur="12s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== Takeaway ===== -->
  <text x="500" y="512" fill="#30d158" font-size="23" font-weight="800" text-anchor="middle">Zero impact on writes — that is the whole point
    <animate attributeName="opacity" values="0.55;0.55;1;1" keyTimes="0;0.375;0.42;1" dur="12s" repeatCount="indefinite"/></text>

  <!-- ===== Loop progress bar ===== -->
  <line x1="80" y1="550" x2="920" y2="550" stroke="#3d4f66" stroke-width="2"/>
  <g stroke="#3d4f66"><line x1="80" y1="545" x2="80" y2="555"/><line x1="220" y1="545" x2="220" y2="555"/><line x1="395" y1="545" x2="395" y2="555"/><line x1="605" y1="545" x2="605" y2="555"/><line x1="780" y1="545" x2="780" y2="555"/><line x1="920" y1="545" x2="920" y2="555"/></g>
  <g fill="#9fb0c3" font-size="10" text-anchor="middle">
    <text x="80" y="573">0 s</text><text x="220" y="573">2 s · crash</text><text x="395" y="573">4.5 s · zero impact</text><text x="605" y="573">7.5 s · restart</text><text x="780" y="573">10 s · caught up</text><text x="920" y="573">12 s ↺</text>
  </g>
  <circle cy="550" r="5" fill="#e6edf3">
    <animate attributeName="cx" values="80;920" dur="12s" repeatCount="indefinite"/>
  </circle>
</svg>
