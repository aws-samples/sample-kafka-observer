<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Promotion sequence: observer -> electable, reusing native ISR-expansion machinery -->
  <defs>
    <marker id="parr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="480" rx="12" fill="#1a2332"/>
  <text x="30" y="40" fill="#e6edf3" font-size="20" font-weight="700">Promotion — observer → electable (measured ≤10 s, zero restart, zero data movement)</text>
  <text x="30" y="62" fill="#9fb0c3" font-size="12.5">Every arrow after step 1 is native Kafka machinery. The patch only opens a gate; ISR expansion, AlterPartition and election eligibility are stock code.</text>

  <!-- Swimlanes -->
  <g font-size="13" font-weight="700">
    <rect x="30" y="90" width="130" height="360" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="95" y="114" fill="#d29922" text-anchor="middle">Operator</text>
    <rect x="170" y="90" width="150" height="360" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="245" y="114" fill="#bc8cff" text-anchor="middle">observer.ids file</text>
    <rect x="330" y="90" width="380" height="360" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="520" y="114" fill="#58a6ff" text-anchor="middle">Leader broker (Partition.scala)</text>
    <rect x="720" y="90" width="250" height="360" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="845" y="114" fill="#3fb950" text-anchor="middle">Controller (ZK / KRaft quorum)</text>
  </g>

  <!-- Step boxes: each group pulses in sequence over a 12s loop -->
  <!-- Step 1 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;1;1;1;1;1;1;0.35" keyTimes="0;0.06;0.2;0.4;0.6;0.8;0.95;1" dur="12s" repeatCount="indefinite"/>
    <rect x="42" y="140" width="106" height="66" rx="8" fill="#223044" stroke="#d29922" stroke-width="1.5"/>
    <text x="95" y="162" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">1 · edit file</text>
    <text x="95" y="180" fill="#e6edf3" font-size="10" text-anchor="middle">delete observer id</text>
    <text x="95" y="194" fill="#9fb0c3" font-size="9.5" text-anchor="middle">(tmp file + mv, all hosts)</text>
    <path d="M148,173 L182,173" stroke="#3fb950" stroke-width="2" marker-end="url(#parr)"/>
  </g>

  <!-- Step 2 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;1;1;0.35" keyTimes="0;0.08;0.14;0.3;0.5;0.8;0.95;1" dur="12s" repeatCount="indefinite"/>
    <rect x="182" y="140" width="126" height="66" rx="8" fill="#223044" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="245" y="162" fill="#bc8cff" font-size="12" font-weight="700" text-anchor="middle">2 · cache refresh</text>
    <text x="245" y="180" fill="#e6edf3" font-size="10" text-anchor="middle">5 s TTL cache expires</text>
    <text x="245" y="194" fill="#9fb0c3" font-size="9.5" text-anchor="middle">ObserverIds re-reads file</text>
    <path d="M308,173 L342,173" stroke="#3fb950" stroke-width="2" marker-end="url(#parr)"/>
  </g>

  <!-- Step 3 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;1;0.35" keyTimes="0;0.2;0.26;0.5;0.8;0.95;1" dur="12s" repeatCount="indefinite"/>
    <rect x="342" y="140" width="170" height="66" rx="8" fill="#223044" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="427" y="162" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">3 · next fetch arrives</text>
    <text x="427" y="180" fill="#e6edf3" font-size="10" text-anchor="middle">replica already caught up →</text>
    <text x="427" y="194" fill="#9fb0c3" font-size="9.5" text-anchor="middle">triggers maybeExpandIsr()</text>
    <path d="M427,206 L427,240" stroke="#3fb950" stroke-width="2" marker-end="url(#parr)"/>
  </g>

  <!-- Step 4 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;1;0.35" keyTimes="0;0.32;0.38;0.6;0.8;0.95;1" dur="12s" repeatCount="indefinite"/>
    <rect x="342" y="240" width="170" height="66" rx="8" fill="#223044" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="427" y="262" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">4 · gate opens</text>
    <text x="427" y="280" fill="#e6edf3" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">canAddReplicaToIsr()</text>
    <text x="427" y="294" fill="#9fb0c3" font-size="9.5" text-anchor="middle">id no longer in list → returns true</text>
    <path d="M512,273 L556,273" stroke="#3fb950" stroke-width="2" marker-end="url(#parr)"/>
  </g>

  <!-- Step 5 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;0.35" keyTimes="0;0.44;0.5;0.7;0.95;1" dur="12s" repeatCount="indefinite"/>
    <rect x="556" y="240" width="142" height="66" rx="8" fill="#223044" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="627" y="262" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">5 · AlterPartition</text>
    <text x="627" y="280" fill="#e6edf3" font-size="10" text-anchor="middle">leader proposes</text>
    <text x="627" y="294" fill="#9fb0c3" font-size="9.5" text-anchor="middle">ISR = old ∪ {observer}</text>
    <path d="M698,273 L744,273" stroke="#3fb950" stroke-width="2" marker-end="url(#parr)"/>
  </g>

  <!-- Step 6 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;0.35" keyTimes="0;0.56;0.62;0.8;0.95;1" dur="12s" repeatCount="indefinite"/>
    <rect x="744" y="240" width="202" height="66" rx="8" fill="#223044" stroke="#3fb950" stroke-width="1.5"/>
    <text x="845" y="262" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">6 · ISR expands</text>
    <text x="845" y="280" fill="#e6edf3" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">Isr: 2,3 → Isr: 2,3,1</text>
    <text x="845" y="294" fill="#9fb0c3" font-size="9.5" text-anchor="middle">committed to ZK / metadata log</text>
    <path d="M845,306 L845,340" stroke="#3fb950" stroke-width="2" marker-end="url(#parr)"/>
  </g>

  <!-- Step 7 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;0.35" keyTimes="0;0.68;0.74;0.95;1" dur="12s" repeatCount="indefinite"/>
    <rect x="744" y="340" width="202" height="70" rx="8" fill="#22452e" stroke="#3fb950" stroke-width="2"/>
    <text x="845" y="364" fill="#3fb950" font-size="12.5" font-weight="700" text-anchor="middle">7 · fully electable ✓</text>
    <text x="845" y="382" fill="#e6edf3" font-size="10" text-anchor="middle">election eligibility restored for free —</text>
    <text x="845" y="396" fill="#e6edf3" font-size="10" text-anchor="middle">leader candidates come from ISR</text>
  </g>

  <!-- timing bar -->
  <g>
    <line x1="42" y1="435" x2="946" y2="435" stroke="#3d4f66" stroke-width="1.5"/>
    <circle cx="42" cy="435" r="3.5" fill="#d29922"/>
    <text x="42" y="456" fill="#9fb0c3" font-size="10">t=0 file edit</text>
    <circle cx="330" cy="435" r="3.5" fill="#bc8cff"/>
    <text x="330" y="456" fill="#9fb0c3" font-size="10" text-anchor="middle">≤5 s cache TTL</text>
    <circle cx="620" cy="435" r="3.5" fill="#58a6ff"/>
    <text x="620" y="456" fill="#9fb0c3" font-size="10" text-anchor="middle">+ one fetch round-trip (≤500 ms)</text>
    <circle cx="946" cy="435" r="4.5" fill="#3fb950"/>
    <text x="946" y="456" fill="#3fb950" font-size="10.5" font-weight="700" text-anchor="end">in ISR — measured 4 s (KRaft) / ≤10 s</text>
    <circle r="4" fill="#3fb950">
      <animateMotion path="M42,435 L946,435" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
