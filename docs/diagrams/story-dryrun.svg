<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Story animation: dry-run mode, 12 s loop, 5 phases (0-2.5-5-7.5-9.5-12 s) -->
  <rect x="0" y="0" width="1000" height="560" rx="12" fill="#1a2332"/>
  <text x="30" y="34" fill="#e6edf3" font-size="19" font-weight="700">Story · Dry-run — watch it think before you let it act</text>
  <text x="970" y="34" fill="#9fb0c3" font-size="12" text-anchor="end">12 s loop · -n flag: full decision trace, zero cluster mutation</text>

  <!-- ===== Phase banners ===== -->
  <g font-size="20" font-weight="800" text-anchor="middle">
    <text x="500" y="76" fill="#ff453a" opacity="0">PHASE 1 · Fault injected — daemon (in dry-run) detects ISR &lt; minISR
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.19;0.208;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="76" fill="#d29922" opacity="0">PHASE 2 · It only WRITES A LOG LINE — the cluster is never touched
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.208;0.23;0.4;0.417;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="76" fill="#58a6ff" opacity="0">PHASE 3 · Human reviews the trace: "it would have done the right thing"
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.417;0.44;0.6;0.625;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="76" fill="#bf5af2" opacity="0">PHASE 4 · Operator flips -n → -e (real mode)
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.625;0.65;0.77;0.792;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="500" y="76" fill="#30d158" opacity="0">PHASE 5 · Same detection → now a REAL promote — trust was earned first
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.792;0.815;0.98;1" dur="12s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== Left: daemon with mode badge ===== -->
  <rect x="50" y="110" width="270" height="200" rx="10" fill="#0d1420" stroke="#58a6ff" stroke-width="2"/>
  <text x="185" y="138" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">observer-auto-promoter.sh</text>
  <!-- mode badge: DRY-RUN then REAL -->
  <g>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.71;0.73;1" dur="12s" repeatCount="indefinite"/>
    <rect x="110" y="152" width="150" height="32" rx="16" fill="#241f0d" stroke="#d29922" stroke-width="2">
      <animate attributeName="stroke-width" values="2;3.2;2" dur="1.4s" repeatCount="indefinite"/></rect>
    <text x="185" y="173" fill="#d29922" font-size="14" font-weight="800" text-anchor="middle">DRY-RUN  (-n)</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.71;0.73;1" dur="12s" repeatCount="indefinite"/>
    <rect x="110" y="152" width="150" height="32" rx="16" fill="#122318" stroke="#30d158" stroke-width="2.5"/>
    <text x="185" y="173" fill="#30d158" font-size="14" font-weight="800" text-anchor="middle">REAL  (-e)</text>
  </g>
  <!-- detection state -->
  <g font-size="12" font-weight="700" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="185" y="216" fill="#ff453a">DETECT: ISR=1 &lt; minISR=2</text>
    <text x="185" y="240" fill="#bf5af2">broker 3: lag=0 ✓ eligible</text>
    <text x="185" y="268" fill="#d29922">decision: PROMOTE broker 3
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.71;0.73;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="185" y="268" fill="#30d158" opacity="0">decision: PROMOTE broker 3
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.71;0.73;1" dur="12s" repeatCount="indefinite"/></text>
  </g>
  <text x="185" y="296" fill="#9fb0c3" font-size="10.5" text-anchor="middle">same code path in both modes — only the last step differs</text>

  <!-- ===== Center: the fork — log (always) vs cluster (only in real mode) ===== -->
  <!-- arrow daemon -> log (always on) -->
  <g>
    <path d="M320,240 C 380,280 420,330 470,368" fill="none" stroke="#d29922" stroke-width="2"/>
    <path d="M470,368 l-11,-2 l5,-9 z" fill="#d29922"/>
    <circle r="4.5" fill="#d29922"><animateMotion path="M320,240 C 380,280 420,330 466,364" dur="1.3s" repeatCount="indefinite"/></circle>
    <text x="360" y="322" fill="#d29922" font-size="11" font-weight="700">log line — always</text>
  </g>
  <!-- arrow daemon -> cluster: BLOCKED in dry-run -->
  <g>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.71;0.73;1" dur="12s" repeatCount="indefinite"/>
    <path d="M320,180 C 420,150 530,145 620,158" fill="none" stroke="#3d4f66" stroke-width="2" stroke-dasharray="7 6"/>
    <!-- blocked sign -->
    <circle cx="480" cy="152" r="17" fill="#1a2332" stroke="#ff453a" stroke-width="3"/>
    <line x1="468" y1="140" x2="492" y2="164" stroke="#ff453a" stroke-width="3"/>
    <text x="480" y="192" fill="#ff453a" font-size="11.5" font-weight="800" text-anchor="middle">cluster mutation: BLOCKED</text>
    <text x="480" y="208" fill="#9fb0c3" font-size="10" text-anchor="middle">observer.ids never written in -n</text>
  </g>
  <!-- arrow daemon -> cluster: LIVE in real mode -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.71;0.73;1" dur="12s" repeatCount="indefinite"/>
    <path d="M320,180 C 420,150 530,145 620,158" fill="none" stroke="#30d158" stroke-width="2.5"/>
    <path d="M620,158 l-11,-4 l2,-10 z" fill="#30d158"/>
    <circle r="5" fill="#30d158"><animateMotion path="M320,180 C 420,150 530,145 614,156" dur="1s" repeatCount="indefinite"/></circle>
    <text x="480" y="136" fill="#30d158" font-size="11.5" font-weight="800" text-anchor="middle">real action: edit observer.ids</text>
  </g>

  <!-- ===== Right: mini cluster ===== -->
  <g>
    <rect x="628" y="112" width="330" height="150" rx="10" fill="#0d1420" stroke="#3d4f66" stroke-width="1.5"/>
    <text x="793" y="134" fill="#9fb0c3" font-size="12" font-weight="700" text-anchor="middle">cluster (untouched during dry-run)</text>
    <rect x="648" y="150" width="88" height="60" rx="8" fill="#223044" stroke="#ff9900" stroke-width="2.5"/>
    <text x="692" y="176" fill="#e6edf3" font-size="12" font-weight="700" text-anchor="middle">b1</text>
    <text x="692" y="196" fill="#ff9900" font-size="10" font-weight="700" text-anchor="middle">LEADER</text>
    <rect x="750" y="150" width="88" height="60" rx="8" fill="#2b1a1c" stroke="#ff453a" stroke-width="2.5"/>
    <text x="794" y="176" fill="#e6edf3" font-size="12" font-weight="700" text-anchor="middle">b2</text>
    <text x="794" y="196" fill="#ff453a" font-size="10" font-weight="800" text-anchor="middle">✗ DOWN</text>
    <!-- b3 observer, turns green only in PHASE 5 -->
    <g>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.83;0.86;1" dur="12s" repeatCount="indefinite"/>
      <rect x="852" y="150" width="88" height="60" rx="8" fill="#241f33" stroke="#bf5af2" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="896" y="176" fill="#e6edf3" font-size="12" font-weight="700" text-anchor="middle">b3</text>
      <text x="896" y="196" fill="#bf5af2" font-size="10" font-weight="700" text-anchor="middle">OBSERVER</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.83;0.86;1" dur="12s" repeatCount="indefinite"/>
      <rect x="852" y="150" width="88" height="60" rx="8" fill="#16281f" stroke="#30d158" stroke-width="2.5"/>
      <text x="896" y="176" fill="#e6edf3" font-size="12" font-weight="700" text-anchor="middle">b3</text>
      <text x="896" y="196" fill="#30d158" font-size="10" font-weight="700" text-anchor="middle">PROMOTED ✓</text>
    </g>
    <g font-size="11" font-weight="700" text-anchor="middle">
      <text x="793" y="242" fill="#ff453a">ISR = {1} — still degraded (dry-run changes nothing)
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.83;0.86;1" dur="12s" repeatCount="indefinite"/></text>
      <text x="793" y="242" fill="#30d158" opacity="0">ISR = {1, 3} — writes resume ✓
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.83;0.86;1" dur="12s" repeatCount="indefinite"/></text>
    </g>
  </g>

  <!-- ===== Bottom left: log terminal ===== -->
  <rect x="50" y="350" width="560" height="160" rx="10" fill="#0d1420" stroke="#d29922" stroke-width="1.5"/>
  <circle cx="70" cy="370" r="4.5" fill="#ff453a"/><circle cx="86" cy="370" r="4.5" fill="#d29922"/><circle cx="102" cy="370" r="4.5" fill="#30d158"/>
  <text x="118" y="374" fill="#9fb0c3" font-size="11" font-weight="700">observer-promoter.log</text>
  <g font-size="12" font-family="ui-monospace,Menlo,monospace">
    <text x="70" y="402" fill="#ff453a">12:00:14 DETECT t0-p0 ISR={1} &lt; minISR=2</text>
    <text x="70" y="426" fill="#d29922" opacity="0">12:00:15 PROMOTE-DRYRUN broker 3 — would edit observer.ids
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.23;0.26;0.98;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="70" y="450" fill="#9fb0c3" opacity="0">12:00:15 reason: lag=0 ≤ threshold; no mutation performed (-n)
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.28;0.31;0.98;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="70" y="474" fill="#bf5af2" opacity="0">12:07:02 restart with -e (real mode) — operator approved
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.65;0.68;0.98;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="70" y="498" fill="#30d158" opacity="0">12:07:14 PROMOTE broker 3 — observer.ids edited, ISR={1,3} in 8 s
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.815;0.845;0.98;1" dur="12s" repeatCount="indefinite"/></text>
  </g>

  <!-- ===== Bottom right: human reviewing ===== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.44;0.47;0.75;0.78;1" dur="12s" repeatCount="indefinite"/>
    <circle cx="700" cy="392" r="14" fill="none" stroke="#e6edf3" stroke-width="2"/>
    <path d="M676,438 q24,-26 48,0" fill="none" stroke="#e6edf3" stroke-width="2"/>
    <!-- eye line to log -->
    <path d="M672,410 C 650,420 635,430 615,440" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="820" y="400" fill="#58a6ff" font-size="12.5" font-weight="700" text-anchor="middle">"Would it have promoted at</text>
    <text x="820" y="418" fill="#58a6ff" font-size="12.5" font-weight="700" text-anchor="middle">the right moment? Yes."</text>
    <text x="820" y="444" fill="#9fb0c3" font-size="10.5" text-anchor="middle">week 1 of the rollout SOP: dry-run only,</text>
    <text x="820" y="460" fill="#9fb0c3" font-size="10.5" text-anchor="middle">tune interval / lag threshold / cooldown</text>
  </g>
  <!-- flip switch visual in PHASE 4 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.65;0.68;0.77;0.80;1" dur="12s" repeatCount="indefinite"/>
    <rect x="700" y="380" width="200" height="44" rx="22" fill="#241f33" stroke="#bf5af2" stroke-width="2"/>
    <text x="756" y="407" fill="#d29922" font-size="13" font-weight="800" text-anchor="middle">-n</text>
    <text x="800" y="407" fill="#9fb0c3" font-size="13" text-anchor="middle">→</text>
    <text x="845" y="407" fill="#30d158" font-size="13" font-weight="800" text-anchor="middle">-e</text>
    <text x="800" y="448" fill="#bf5af2" font-size="11" font-weight="700" text-anchor="middle">one flag — same detector, real hands</text>
  </g>

  <!-- footer -->
  <text x="500" y="544" fill="#9fb0c3" font-size="11.5" text-anchor="middle">Dry-run is the trust ladder: the daemon proves its judgment on real faults before it is ever allowed to touch observer.ids.</text>
</svg>
