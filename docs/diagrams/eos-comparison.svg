<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- EOS comparison: observer byte-copy replication (top) vs MM2 consume-reproduce (bottom) -->
  <defs>
    <marker id="earrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
    <marker id="earrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f85149"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="600" rx="12" fill="#1a2332"/>
  <text x="30" y="40" fill="#e6edf3" font-size="20" font-weight="700">Why exactly-once survives observers but not MirrorMaker 2</text>
  <text x="30" y="62" fill="#9fb0c3" font-size="12.5">replicate-the-log (one offset space) vs consume → re-produce (two offset spaces). A structural difference, not a tuning difference. All numbers from real-machine evidence.</text>

  <!-- ================= TOP: observer byte-copy ================= -->
  <g>
    <rect x="30" y="84" width="940" height="230" rx="10" fill="#20293a" stroke="#3fb950" stroke-width="1.5"/>
    <text x="46" y="110" fill="#3fb950" font-size="14" font-weight="700">Observer — same-cluster log replication (byte copy)</text>

    <!-- leader log -->
    <rect x="60" y="130" width="300" height="120" rx="8" fill="#223044" stroke="#58a6ff"/>
    <text x="210" y="152" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">Leader log</text>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5">
      <rect x="76" y="164" width="82" height="34" rx="4" fill="#1a2332" stroke="#3d4f66"/>
      <text x="117" y="178" fill="#e6edf3" text-anchor="middle">offset 0–99</text>
      <text x="117" y="192" fill="#9fb0c3" text-anchor="middle">PID 4001 seq 0</text>
      <rect x="164" y="164" width="82" height="34" rx="4" fill="#1a2332" stroke="#3d4f66"/>
      <text x="205" y="178" fill="#e6edf3" text-anchor="middle">offset 100–199</text>
      <text x="205" y="192" fill="#9fb0c3" text-anchor="middle">PID 4001 seq 100</text>
      <rect x="252" y="164" width="90" height="34" rx="4" fill="#1a2332" stroke="#d29922"/>
      <text x="297" y="178" fill="#d29922" text-anchor="middle">COMMIT marker</text>
      <text x="297" y="192" fill="#9fb0c3" text-anchor="middle">txn ctl batch</text>
    </g>
    <text x="210" y="228" fill="#9fb0c3" font-size="10" text-anchor="middle">producer → leader: the ONLY path EOS must defend</text>

    <!-- fetch arrow with traveling batch -->
    <path id="eObs" d="M360,190 L600,190" stroke="#3fb950" stroke-width="2.5" fill="none" marker-end="url(#earrG)"/>
    <text x="480" y="172" fill="#3fb950" font-size="11" font-weight="600" text-anchor="middle">replica fetch — appendAsFollower()</text>
    <text x="480" y="212" fill="#9fb0c3" font-size="9.5" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">validateAndAssignOffsets = false</text>
    <text x="480" y="226" fill="#9fb0c3" font-size="9.5" text-anchor="middle">"we are taking the offsets we are given"</text>
    <rect width="26" height="12" rx="3" fill="#3fb950" opacity="0.9">
      <animateMotion dur="2s" repeatCount="indefinite"><mpath href="#eObs"/></animateMotion>
    </rect>

    <!-- observer log -->
    <rect x="610" y="130" width="300" height="120" rx="8" fill="#223044" stroke="#bc8cff"/>
    <text x="760" y="152" fill="#bc8cff" font-size="12" font-weight="700" text-anchor="middle">Observer log — byte-identical</text>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5">
      <rect x="626" y="164" width="82" height="34" rx="4" fill="#1a2332" stroke="#3d4f66"/>
      <text x="667" y="178" fill="#e6edf3" text-anchor="middle">offset 0–99</text>
      <text x="667" y="192" fill="#9fb0c3" text-anchor="middle">PID 4001 seq 0</text>
      <rect x="714" y="164" width="82" height="34" rx="4" fill="#1a2332" stroke="#3d4f66"/>
      <text x="755" y="178" fill="#e6edf3" text-anchor="middle">offset 100–199</text>
      <text x="755" y="192" fill="#9fb0c3" text-anchor="middle">PID 4001 seq 100</text>
      <rect x="802" y="164" width="90" height="34" rx="4" fill="#1a2332" stroke="#d29922"/>
      <text x="847" y="178" fill="#d29922" text-anchor="middle">COMMIT marker</text>
      <text x="847" y="192" fill="#9fb0c3" text-anchor="middle">copied as-is</text>
    </g>
    <text x="760" y="228" fill="#3fb950" font-size="10" font-weight="600" text-anchor="middle">per-batch CRC identical — verified over 5 001 messages</text>

    <!-- verdict strip -->
    <rect x="60" y="264" width="850" height="36" rx="6" fill="#22452e" stroke="#3fb950"/>
    <text x="76" y="287" fill="#3fb950" font-size="11.5" font-weight="700">✓ One offset space · PID/epoch/sequence copied in batch headers · txn markers copied · read_committed view identical · no re-produce step exists → nothing can duplicate</text>
  </g>

  <!-- ================= BOTTOM: MM2 consume-reproduce ================= -->
  <g>
    <rect x="30" y="330" width="940" height="230" rx="10" fill="#20293a" stroke="#f85149" stroke-width="1.5"/>
    <text x="46" y="356" fill="#f85149" font-size="14" font-weight="700">MirrorMaker 2 — cross-cluster consume → re-produce (control group)</text>

    <!-- source log -->
    <rect x="60" y="376" width="240" height="110" rx="8" fill="#223044" stroke="#58a6ff"/>
    <text x="180" y="398" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">Source cluster log</text>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5">
      <rect x="76" y="410" width="98" height="34" rx="4" fill="#1a2332" stroke="#3d4f66"/>
      <text x="125" y="424" fill="#e6edf3" text-anchor="middle">offset 0–19999</text>
      <text x="125" y="438" fill="#9fb0c3" text-anchor="middle">PID 4001 (idempotent)</text>
    </g>
    <text x="180" y="470" fill="#9fb0c3" font-size="10" text-anchor="middle">20 000 msgs, zero duplicates</text>

    <!-- consume arrow -->
    <path id="eCons" d="M300,420 L420,420" stroke="#f85149" stroke-width="2.5" fill="none" marker-end="url(#earrR)"/>
    <text x="360" y="404" fill="#f85149" font-size="10.5" font-weight="600" text-anchor="middle">consume</text>
    <circle r="4" fill="#f85149">
      <animateMotion dur="2s" repeatCount="indefinite"><mpath href="#eCons"/></animateMotion>
    </circle>

    <!-- MM2 box -->
    <rect x="424" y="386" width="152" height="90" rx="8" fill="#223044" stroke="#f85149"/>
    <text x="500" y="408" fill="#e6edf3" font-size="12" font-weight="700" text-anchor="middle">MM2 worker</text>
    <text x="500" y="426" fill="#9fb0c3" font-size="9.5" text-anchor="middle">new producer session</text>
    <text x="500" y="440" fill="#9fb0c3" font-size="9.5" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">producerId = -1</text>
    <text x="500" y="458" fill="#f85149" font-size="10" font-weight="700" text-anchor="middle">kill -9 in the 60 s
      <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/></text>
    <text x="500" y="470" fill="#f85149" font-size="10" font-weight="700" text-anchor="middle">offset-flush window
      <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/></text>

    <!-- offset break scissors -->
    <text x="360" y="444" fill="#f85149" font-size="16" font-weight="800" text-anchor="middle">✂</text>
    <text x="360" y="460" fill="#f85149" font-size="9.5" text-anchor="middle">offset space broken</text>

    <!-- re-produce arrow -->
    <path id="eProd2" d="M576,420 L690,420" stroke="#f85149" stroke-width="2.5" fill="none" marker-end="url(#earrR)"/>
    <text x="633" y="404" fill="#f85149" font-size="10.5" font-weight="600" text-anchor="middle">re-produce</text>
    <!-- duplicate pair of dots traveling together = duplicated messages -->
    <circle r="4" fill="#f85149">
      <animateMotion dur="2s" repeatCount="indefinite"><mpath href="#eProd2"/></animateMotion>
    </circle>
    <circle r="4" fill="#f85149" opacity="0.7">
      <animateMotion dur="2s" begin="0.25s" repeatCount="indefinite"><mpath href="#eProd2"/></animateMotion>
    </circle>

    <!-- target log -->
    <rect x="694" y="376" width="246" height="110" rx="8" fill="#223044" stroke="#f85149"/>
    <text x="817" y="398" fill="#f85149" font-size="12" font-weight="700" text-anchor="middle">Target cluster log</text>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5">
      <rect x="710" y="410" width="100" height="34" rx="4" fill="#1a2332" stroke="#3d4f66"/>
      <text x="760" y="424" fill="#e6edf3" text-anchor="middle">offset 0–19999</text>
      <text x="760" y="438" fill="#9fb0c3" text-anchor="middle">PID -1, no dedup</text>
      <rect x="818" y="410" width="108" height="34" rx="4" fill="#3a2430" stroke="#f85149"/>
      <text x="872" y="424" fill="#f85149" text-anchor="middle">offset 20000–39999</text>
      <text x="872" y="438" fill="#f85149" text-anchor="middle">FULL REPLAY
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></text>
    </g>
    <text x="817" y="470" fill="#f85149" font-size="10" font-weight="700" text-anchor="middle">40 000 msgs — every payload exactly twice</text>

    <!-- verdict strip -->
    <rect x="60" y="504" width="850" height="42" rx="6" fill="#3a2430" stroke="#f85149"/>
    <text x="76" y="522" fill="#f85149" font-size="11.5" font-weight="700">✗ Two offset spaces (target reassigns) · PID/epoch lost (producerId = -1 → broker has no basis for dedup) · txn markers not propagated</text>
    <text x="76" y="538" fill="#9fb0c3" font-size="10.5">Restart log: "Resetting offset for partition mm2_src-0 to position offset=0" → full replay · client failover needs approximate offset translation</text>
  </g>

  <text x="30" y="584" fill="#5b6b80" font-size="10">Evidence: eos_byte_level_evidence.md (CRC identity) · txn_read_committed_evidence.md (markers/LSO) · mm2_duplicate_evidence.md (20 000 → 40 000 duplication). MM2-class tools remain the right answer for cross-region DR — different problem.</text>
</svg>
