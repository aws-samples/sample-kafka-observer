<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- Demotion sequence: electable -> observer, reusing the native isr-expiration shrink task -->
  <defs>
    <marker id="darr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f85149"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="460" rx="12" fill="#1a2332"/>
  <text x="30" y="40" fill="#e6edf3" font-size="20" font-weight="700">Demotion — electable → observer (measured ≤10–20 s, zero restart)</text>
  <text x="30" y="62" fill="#9fb0c3" font-size="12.5">No new shrink code: hook #2 makes the native isr-expiration task report the observer as out-of-sync; the stock shrink flow does the rest.</text>

  <!-- Swimlanes (same style as promotion-flow) -->
  <g font-size="13" font-weight="700">
    <rect x="30" y="90" width="130" height="300" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="95" y="114" fill="#d29922" text-anchor="middle">Operator</text>
    <rect x="170" y="90" width="150" height="300" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="245" y="114" fill="#bc8cff" text-anchor="middle">observer.ids file</text>
    <rect x="330" y="90" width="380" height="300" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="520" y="114" fill="#58a6ff" text-anchor="middle">Leader broker (Partition.scala)</text>
    <rect x="720" y="90" width="250" height="300" rx="8" fill="#20293a" stroke="#3d4f66"/>
    <text x="845" y="114" fill="#3fb950" text-anchor="middle">Controller (ZK / KRaft quorum)</text>
  </g>

  <!-- Step 1 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;1;1;1;1;1;0.35" keyTimes="0;0.07;0.25;0.5;0.75;0.95;1" dur="11s" repeatCount="indefinite"/>
    <rect x="42" y="140" width="106" height="66" rx="8" fill="#223044" stroke="#d29922" stroke-width="1.5"/>
    <text x="95" y="162" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">1 · edit file</text>
    <text x="95" y="180" fill="#e6edf3" font-size="10" text-anchor="middle">write id back</text>
    <text x="95" y="194" fill="#9fb0c3" font-size="9.5" text-anchor="middle">(tmp file + mv, all hosts)</text>
    <path d="M148,173 L182,173" stroke="#f85149" stroke-width="2" marker-end="url(#darr)"/>
  </g>

  <!-- Step 2 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;1;0.35" keyTimes="0;0.1;0.17;0.4;0.75;0.95;1" dur="11s" repeatCount="indefinite"/>
    <rect x="182" y="140" width="126" height="66" rx="8" fill="#223044" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="245" y="162" fill="#bc8cff" font-size="12" font-weight="700" text-anchor="middle">2 · cache refresh</text>
    <text x="245" y="180" fill="#e6edf3" font-size="10" text-anchor="middle">5 s TTL cache expires</text>
    <text x="245" y="194" fill="#9fb0c3" font-size="9.5" text-anchor="middle">id is observer again</text>
    <path d="M308,173 L342,173" stroke="#f85149" stroke-width="2" marker-end="url(#darr)"/>
  </g>

  <!-- Step 3 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;0.35" keyTimes="0;0.24;0.31;0.55;0.95;1" dur="11s" repeatCount="indefinite"/>
    <rect x="342" y="140" width="170" height="66" rx="8" fill="#223044" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="427" y="162" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">3 · isr-expiration ticks</text>
    <text x="427" y="180" fill="#e6edf3" font-size="10" text-anchor="middle">periodic task, every</text>
    <text x="427" y="194" fill="#9fb0c3" font-size="9.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">replica.lag.time.max.ms / 2</text>
    <path d="M427,206 L427,240" stroke="#f85149" stroke-width="2" marker-end="url(#darr)"/>
  </g>

  <!-- Step 4 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;1;0.35" keyTimes="0;0.37;0.44;0.65;0.95;1" dur="11s" repeatCount="indefinite"/>
    <rect x="342" y="240" width="170" height="66" rx="8" fill="#223044" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="427" y="262" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">4 · hook reports it</text>
    <text x="427" y="280" fill="#e6edf3" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">getOutOfSyncReplicas()</text>
    <text x="427" y="294" fill="#9fb0c3" font-size="9.5" text-anchor="middle">in-ISR observer counted as lagging</text>
    <path d="M512,273 L556,273" stroke="#f85149" stroke-width="2" marker-end="url(#darr)"/>
  </g>

  <!-- Step 5 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;0.35" keyTimes="0;0.5;0.57;0.95;1" dur="11s" repeatCount="indefinite"/>
    <rect x="556" y="240" width="142" height="66" rx="8" fill="#223044" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="627" y="262" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">5 · native shrink</text>
    <text x="627" y="280" fill="#e6edf3" font-size="10" text-anchor="middle">AlterPartition proposes</text>
    <text x="627" y="294" fill="#9fb0c3" font-size="9.5" text-anchor="middle">ISR \ {observer}, HW recomputed</text>
    <path d="M698,273 L744,273" stroke="#f85149" stroke-width="2" marker-end="url(#darr)"/>
  </g>

  <!-- Step 6 -->
  <g opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;0.35" keyTimes="0;0.63;0.7;0.95;1" dur="11s" repeatCount="indefinite"/>
    <rect x="744" y="240" width="202" height="80" rx="8" fill="#3a2430" stroke="#f85149" stroke-width="2"/>
    <text x="845" y="264" fill="#f85149" font-size="12.5" font-weight="700" text-anchor="middle">6 · out of ISR — observer again</text>
    <text x="845" y="282" fill="#e6edf3" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">Isr: 2,3,1 → Isr: 2,3</text>
    <text x="845" y="298" fill="#9fb0c3" font-size="9.5" text-anchor="middle">keeps fetching, drops all eligibility</text>
    <text x="845" y="312" fill="#9fb0c3" font-size="9.5" text-anchor="middle">(HW / acks=all / election)</text>
  </g>

  <!-- Warning note -->
  <g>
    <rect x="342" y="330" width="356" height="46" rx="8" fill="#2d2a1c" stroke="#d29922"/>
    <text x="356" y="349" fill="#d29922" font-size="10.5" font-weight="700">⚠ The native path never shrinks the leader itself.</text>
    <text x="356" y="365" fill="#9fb0c3" font-size="10">Move leadership first (kafka-leader-election.sh) before demoting a current leader — hot in ZK &amp; KRaft alike.</text>
  </g>

  <!-- timing bar -->
  <g>
    <line x1="42" y1="415" x2="946" y2="415" stroke="#3d4f66" stroke-width="1.5"/>
    <circle cx="42" cy="415" r="3.5" fill="#d29922"/>
    <text x="42" y="436" fill="#9fb0c3" font-size="10">t=0 file edit</text>
    <circle cx="300" cy="415" r="3.5" fill="#bc8cff"/>
    <text x="300" y="436" fill="#9fb0c3" font-size="10" text-anchor="middle">≤5 s cache TTL</text>
    <circle cx="620" cy="415" r="3.5" fill="#58a6ff"/>
    <text x="620" y="436" fill="#9fb0c3" font-size="10" text-anchor="middle">next isr-expiration tick (≤15 s default)</text>
    <circle cx="946" cy="415" r="4.5" fill="#f85149"/>
    <text x="946" y="436" fill="#f85149" font-size="10.5" font-weight="700" text-anchor="end">out of ISR — measured 9 s (KRaft) / ≤10–20 s</text>
    <circle r="4" fill="#f85149">
      <animateMotion path="M42,415 L946,415" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
